<script>
        const STORAGE_KEY = 'goal_tracker_v10_cloud';
        const AUTO_BACKUP_CONFIG = {
            maxBackups: 7,
            backupPrefix: 'goal_backup_',
            backupInterval: 10 * 60 * 1000
        };
        
        let mainGoal = '赚钱1000元';
        let projects = [];
        let dailyRecords = {};
        let todoItems = {};
        let gistConfig = {
            token: '',
            gistId: ''
        };

        let currentEditTodoTags = '';
        let currentPage = 'home';
        let currentProjectId = null;
        let currentMonth = new Date().toISOString().slice(0, 7);
        let showEditTodoModal = false;
        let currentEditTodoId = null;
        let currentEditTodoProjectId = null;
        let currentEditTodoText = '';
        let currentEditTodoProgress = 0;
        let currentEditTodoTarget = 100;
        let currentEditTodoUnit = '个';
        let showAddProjectModal = false;
        let showEditGoalModal = false;
        let showEditRecordModal = false;
        let showEditProjectModal = false;
        let showSettingsModal = false;
        let currentEditDay = null;
        let currentEditContent = '';
        let currentEditProjectId = null;
        let todoExpanded = {};
        let syncStatus = '';
        let isSyncing = false;

        function checkStorageStatus() {
            const status = { localStorage: false, sessionStorage: false, quota: 0 };
            try {
                localStorage.setItem('test', 'test');
                localStorage.removeItem('test');
                status.localStorage = true;
            } catch (e) {
                status.localStorage = false;
            }
            try {
                sessionStorage.setItem('test', 'test');
                sessionStorage.removeItem('test');
                status.sessionStorage = true;
            } catch (e) {
                status.sessionStorage = false;
            }
            let total = 0;
            for(let key in localStorage) {
                if(localStorage.hasOwnProperty(key)) {
                    total += localStorage[key].length * 2 / 1024 / 1024;
                }
            }
            status.quota = total.toFixed(2);
            return status;
        }

        function exportDataToFile() {
            const data = { mainGoal, projects, dailyRecords, todoItems, gistConfig };
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `goal-backup-${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('备份文件已导出，请保存到手机存储中！');
        }

        function importDataFromFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.mainGoal !== undefined && data.projects !== undefined) {
                        mainGoal = data.mainGoal;
                        projects = data.projects;
                        dailyRecords = data.dailyRecords || {};
                        todoItems = data.todoItems || {};
                        gistConfig = data.gistConfig || { token: '', gistId: '' };
                        saveData();
                        render();
                        alert('数据导入成功！');
                    } else {
                        alert('无效的备份文件格式');
                    }
                } catch (error) {
                    alert('导入失败：' + error.message);
                }
            };
            reader.readAsText(file);
        }

        function cleanupOldBackups(force = false) {
            const allKeys = Object.keys(localStorage);
            const backupKeys = allKeys
                .filter(key => key.startsWith(AUTO_BACKUP_CONFIG.backupPrefix))
                .sort((a, b) => b.localeCompare(a));
            
            if (backupKeys.length > AUTO_BACKUP_CONFIG.maxBackups || force) {
                const keysToDelete = force 
                    ? backupKeys.slice(Math.floor(AUTO_BACKUP_CONFIG.maxBackups / 2))
                    : backupKeys.slice(AUTO_BACKUP_CONFIG.maxBackups);
                
                keysToDelete.forEach(key => {
                    localStorage.removeItem(key);
                    console.log(`🗑️ 删除旧备份: ${key}`);
                });
            }
        }

        function autoBackup() {
            const data = { mainGoal, projects, dailyRecords, todoItems, gistConfig };
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            const backupKey = `${AUTO_BACKUP_CONFIG.backupPrefix}${timestamp}`;
            
            try {
                localStorage.setItem(backupKey, JSON.stringify({
                    ...data,
                    backupTime: new Date().toISOString()
                }));
                console.log('💾 自动备份创建成功:', backupKey);
                cleanupOldBackups();
            } catch (error) {
                console.error('自动备份失败:', error);
            }
        }

        function getBackupList() {
            const allKeys = Object.keys(localStorage);
            return allKeys
                .filter(key => key.startsWith(AUTO_BACKUP_CONFIG.backupPrefix))
                .map(key => {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        return {
                            key,
                            time: data?.backupTime || key,
                            projectsCount: data?.projects?.length || 0
                        };
                    } catch {
                        return null;
                    }
                })
                .filter(Boolean)
                .sort((a, b) => b.time.localeCompare(a.time));
        }

        function restoreBackup(backupKey) {
            try {
                const backupData = JSON.parse(localStorage.getItem(backupKey));
                if (!backupData) {
                    alert('备份文件不存在');
                    return;
                }
                
                if (confirm('确定要恢复此备份吗？当前数据将被覆盖。')) {
                    mainGoal = backupData.mainGoal || mainGoal;
                    projects = backupData.projects || [];
                    dailyRecords = backupData.dailyRecords || {};
                    todoItems = backupData.todoItems || {};
                    gistConfig = backupData.gistConfig || { token: '', gistId: '' };
                    
                    saveData();
                    render();
                    alert('备份恢复成功！');
                }
            } catch (error) {
                alert('恢复失败：' + error.message);
            }
        }

        function showBackupManager() {
            const backups = getBackupList();
            let message = '=== 备份管理 ===\n\n';
            
            if (backups.length === 0) {
                message += '暂无自动备份\n';
            } else {
                backups.forEach((backup, index) => {
                    const date = new Date(backup.time).toLocaleString();
                    message += `${index + 1}. ${date}\n`;
                    message += `   项目数: ${backup.projectsCount}\n\n`;
                });
            }
            
            message += '\n输入编号恢复备份，或取消';
            
            const choice = prompt(message);
            if (choice && !isNaN(parseInt(choice))) {
                const index = parseInt(choice) - 1;
                if (index >= 0 && index < backups.length) {
                    restoreBackup(backups[index].key);
                }
            }
        }

        function loadData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    mainGoal = data.mainGoal || mainGoal;
                    projects = data.projects || [];
                    dailyRecords = data.dailyRecords || {};
                    todoItems = data.todoItems || {};
                    gistConfig = data.gistConfig || { token: '', gistId: '' };
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        function saveData() {
            try {
                const data = { mainGoal, projects, dailyRecords, todoItems, gistConfig };
                const dataStr = JSON.stringify(data);
                
                try {
                    localStorage.setItem(STORAGE_KEY, dataStr);
                    console.log('✅ localStorage 保存成功');
                } catch (e) {
                    console.warn('⚠️ localStorage 失败，尝试清理空间后重试:', e);
                    
                    if (e.name === 'QuotaExceededError') {
                        cleanupOldBackups(true);
                        try {
                            localStorage.setItem(STORAGE_KEY, dataStr);
                            console.log('✅ 清理后保存成功');
                        } catch (retryError) {
                            console.error('❌ 清理后仍然失败:', retryError);
                        }
                    }
                }
                
                try {
                    sessionStorage.setItem(STORAGE_KEY, dataStr);
                    console.log('✅ sessionStorage 保存成功');
                } catch (e) {
                    console.warn('⚠️ sessionStorage 失败:', e);
                }
                
                window.__lastBackup = data;
                
                if (projects.length > 5 && projects.length % 10 === 0) {
                    const shouldExport = confirm('检测到您有多个项目，建议导出备份文件到手机存储，防止数据丢失。要现在导出吗？');
                    if (shouldExport) {
                        exportDataToFile();
                    }
                }
                
            } catch (error) {
                console.error('❌ 所有存储方式都失败:', error);
                
                if (confirm('保存失败！是否导出备份文件到手机？')) {
                    exportDataToFile();
                }
            }
        }

        function toSafeString(value) {
            if (value === null || value === undefined) return '';
            if (typeof value === 'object') {
                try {
                    return JSON.stringify(value);
                } catch {
                    return '';
                }
            }
            return String(value);
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }

        function getCurrentYearMonth() {
            const now = new Date();
            return {
                year: now.getFullYear(),
                month: now.getMonth(),
                monthStr: now.toISOString().slice(0, 7)
            };
        }

        function hasContent(value) {
            const str = toSafeString(value);
            return str.trim() !== '';
        }

        function getOverallProgress() {
            if (projects.length === 0) return 0;
            
            let totalProgress = 0;
            for (let i = 0; i < projects.length; i++) {
                const p = projects[i];
                if (p.progressTarget && p.progressTarget > 0) {
                    totalProgress += (p.progressCurrent || 0) / p.progressTarget * 100;
                }
            }
            return Math.round(totalProgress / projects.length);
        }

        function getCompletedProjectsCount() {
            let count = 0;
            for (let i = 0; i < projects.length; i++) {
                const p = projects[i];
                if (p.progressCurrent >= p.progressTarget) {
                    count++;
                }
            }
            return count;
        }

        function getWeekday(year, month, day) {
            const date = new Date(year, month - 1, day);
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            return weekdays[date.getDay()];
        }

        function toggleProjectComplete(projectId) {
            const project = projects.find(p => p.id === projectId);
            if (project) {
                if (project.progressCurrent >= project.progressTarget) {
                    project.progressCurrent = 0;
                } else {
                    project.progressCurrent = project.progressTarget;
                }
                saveData();
                render();
            }
        }

        function updateProgress(projectId, delta) {
            const project = projects.find(p => p.id === projectId);
            if (project) {
                const newValue = (project.progressCurrent || 0) + delta;
                if (newValue >= 0 && newValue <= project.progressTarget) {
                    project.progressCurrent = newValue;
                    saveData();
                    render();
                }
            }
        }

        function openRecordModal(day, content) {
            currentEditDay = day;
            currentEditContent = toSafeString(content);
            showEditRecordModal = true;
            render();
            setTimeout(() => {
                const textarea = document.getElementById('record-input');
                if (textarea) {
                    textarea.focus();
                    textarea.value = currentEditContent;
                }
            }, 100);
        }

        function closeRecordModal() {
            showEditRecordModal = false;
            currentEditDay = null;
            currentEditContent = '';
            render();
        }

        function openEditTodoModal(projectId, todoId) {
            const key = projectId.toString();
            const todos = todoItems[key];
            if (todos) {
                const todo = todos.find(t => t.id === todoId);
                if (todo) {
                    currentEditTodoProjectId = projectId;
                    currentEditTodoId = todoId;
                    currentEditTodoText = todo.text || '';
                    currentEditTodoProgress = todo.progress || 0;
                    currentEditTodoTarget = todo.target || '';
                    currentEditTodoUnit = todo.unit || '个';
                    currentEditTodoTags = todo.tags ? todo.tags.join(' ') : '';
                    
                    showEditTodoModal = true;
                    render();
                    
                    setTimeout(() => {
                        document.getElementById('edit-todo-text')?.focus();
                    }, 100);
                }
            }
        }

        function closeEditTodoModal() {
            showEditTodoModal = false;
            currentEditTodoId = null;
            currentEditTodoProjectId = null;
            render();
        }

        function saveEditTodo() {
            const textInput = document.getElementById('edit-todo-text');
            const progressInput = document.getElementById('edit-todo-progress');
            const targetInput = document.getElementById('edit-todo-target');
            const unitInput = document.getElementById('edit-todo-unit');
            const tagsInput = document.getElementById('edit-todo-tags');
            
            if (!currentEditTodoProjectId) return;
            
            const key = currentEditTodoProjectId.toString();
            if (!todoItems[key]) {
                todoItems[key] = [];
            }
            
            const text = textInput?.value.trim();
            if (!text) {
                alert('请输入待办内容');
                return;
            }
            
            const tagsString = tagsInput?.value.trim() || '';
            const tags = tagsString.split(/[,\s]+/).filter(tag => tag.trim() !== '');
            
            const progress = progressInput?.value ? parseInt(progressInput.value) : NaN;
            const target = targetInput?.value ? parseInt(targetInput.value) : NaN;
            const unit = unitInput?.value.trim();
            
            if (currentEditTodoId) {
                const todo = todoItems[key].find(t => t.id === currentEditTodoId);
                if (todo) {
                    todo.text = text;
                    todo.tags = tags;
                    
                    if (!isNaN(target) && target > 0) {
                        todo.target = target;
                        todo.progress = !isNaN(progress) && progress >= 0 ? Math.min(progress, target) : 0;
                        todo.unit = unit || '个';
                    } else {
                        delete todo.progress;
                        delete todo.target;
                        delete todo.unit;
                    }
                }
            } else {
                const newTodo = {
                    id: Date.now() + Math.random(),
                    text: text,
                    tags: tags
                };
                
                if (!isNaN(target) && target > 0) {
                    newTodo.target = target;
                    newTodo.progress = !isNaN(progress) && progress >= 0 ? Math.min(progress, target) : 0;
                    newTodo.unit = unit || '个';
                }
                
                todoItems[key].push(newTodo);
            }
            
            saveData();
            closeEditTodoModal();
        }

        function saveRecord() {
            const textarea = document.getElementById('record-input');
            if (textarea && currentEditDay) {
                const content = textarea.value;
                const key = currentProjectId + '_' + currentMonth;
                if (!dailyRecords[key]) dailyRecords[key] = {};
                dailyRecords[key][currentEditDay] = content;
                saveData();
            }
            closeRecordModal();
        }

        function openAddTodoModal() {
            currentEditTodoProjectId = currentProjectId;
            currentEditTodoId = null;
            currentEditTodoText = '';
            currentEditTodoProgress = 0;
            currentEditTodoTarget = '';
            currentEditTodoUnit = '';
            currentEditTodoTags = '';
            
            showEditTodoModal = true;
            render();
            setTimeout(() => {
                document.getElementById('edit-todo-text')?.focus();
            }, 100);
        }

        function updateTodoProgress(projectId, todoId, delta) {
            const key = projectId.toString();
            const todos = todoItems[key];
            if (todos) {
                const todo = todos.find(t => t.id === todoId);
                if (todo && todo.progress !== undefined) {
                    const newValue = todo.progress + delta;
                    if (newValue >= 0 && newValue <= todo.target) {
                        todo.progress = newValue;
                        saveData();
                        render();
                    }
                }
            }
        }

        function toggleTodoComplete(projectId, todoId) {
            const key = projectId.toString();
            const todos = todoItems[key];
            if (todos) {
                const todo = todos.find(t => t.id === todoId);
                if (todo && todo.target !== undefined && todo.target > 0) {
                    if (todo.progress >= todo.target) {
                        todo.progress = 0;
                    } else {
                        todo.progress = todo.target;
                    }
                    saveData();
                    render();
                }
            }
        }

        function deleteTodo(projectId, todoId) {
            const key = projectId.toString();
            const todos = todoItems[key];
            if (todos) {
                todoItems[key] = todos.filter(t => t.id !== todoId);
                saveData();
                render();
            }
        }

        function toggleTodoSection(projectId) {
            todoExpanded[projectId] = !todoExpanded[projectId];
            render();
        }

        function openSettingsModal() {
            showSettingsModal = true;
            render();
            setTimeout(() => {
                document.getElementById('gist-token').value = gistConfig.token || '';
                document.getElementById('gist-id').value = gistConfig.gistId || '';
            }, 100);
        }

        function closeSettingsModal() {
            showSettingsModal = false;
            syncStatus = '';
            render();
        }

        function saveSettings() {
            const token = document.getElementById('gist-token')?.value || '';
            const gistId = document.getElementById('gist-id')?.value || '';
            
            gistConfig.token = token.trim();
            gistConfig.gistId = gistId.trim();
            
            saveData();
            closeSettingsModal();
        }

        async function syncToGist() {
            if (!gistConfig.token || !gistConfig.gistId) {
                syncStatus = '请先在设置中配置 Token 和 Gist ID';
                render();
                return;
            }

            isSyncing = true;
            syncStatus = '同步中...';
            render();

            try {
                const data = {
                    mainGoal,
                    projects,
                    dailyRecords,
                    todoItems
                };

                const content = JSON.stringify(data, null, 2);
                
                const response = await fetch(`https://api.github.com/gists/${gistConfig.gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${gistConfig.token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        files: {
                            'goal-tracker-backup.json': {
                                content: content
                            }
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`同步失败: ${response.status}`);
                }

                syncStatus = '同步成功！';
                isSyncing = false;
                render();
                
                setTimeout(() => {
                    syncStatus = '';
                    render();
                }, 3000);
            } catch (error) {
                console.error('同步失败:', error);
                syncStatus = `同步失败: ${error.message}`;
                isSyncing = false;
                render();
            }
        }

        async function restoreFromGist() {
            if (!gistConfig.token || !gistConfig.gistId) {
                syncStatus = '请先在设置中配置 Token 和 Gist ID';
                render();
                return;
            }

            isSyncing = true;
            syncStatus = '恢复中...';
            render();

            try {
                const response = await fetch(`https://api.github.com/gists/${gistConfig.gistId}`, {
                    headers: {
                        'Authorization': `token ${gistConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`恢复失败: ${response.status}`);
                }

                const gist = await response.json();
                const content = gist.files['goal-tracker-backup.json']?.content;
                
                if (!content) {
                    throw new Error('未找到备份文件');
                }

                const data = JSON.parse(content);
                
                mainGoal = data.mainGoal || mainGoal;
                projects = data.projects || [];
                dailyRecords = data.dailyRecords || {};
                todoItems = data.todoItems || {};
                
                saveData();
                
                syncStatus = '恢复成功！';
                isSyncing = false;
                render();
                
                setTimeout(() => {
                    syncStatus = '';
                    render();
                }, 3000);
            } catch (error) {
                console.error('恢复失败:', error);
                syncStatus = `恢复失败: ${error.message}`;
                isSyncing = false;
                render();
            }
        }

        function renderHome() {
            const overallProgress = getOverallProgress();
            const completedProjects = getCompletedProjectsCount();
            
            let projectsHtml = '';
            for (let i = 0; i < projects.length; i++) {
                const project = projects[i];
                const projectName = toSafeString(project.name);
                const projectTarget = toSafeString(project.target);
                const progressPercent = project.progressTarget > 0 
                    ? Math.round((project.progressCurrent || 0) / project.progressTarget * 100) 
                    : 0;
                
                const isCompleted = project.progressCurrent >= project.progressTarget;
                
                let deadlineHtml = '';
                let deadlineClass = '';
                let deadlineText = '';
                let formattedDate = '';
                
                if (project.deadline) {
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const deadlineDate = new Date(project.deadline);
                    deadlineDate.setHours(0, 0, 0, 0);
                    
                    const diffTime = deadlineDate - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    
                    if (diffDays > 0) {
                        deadlineText = `剩${diffDays}天`;
                        deadlineClass = diffDays <= 3 ? 'deadline-urgent' : '';
                    } else if (diffDays === 0) {
                        deadlineText = '今天截止';
                        deadlineClass = 'deadline-urgent';
                    } else {
                        deadlineText = `逾期${Math.abs(diffDays)}天`;
                        deadlineClass = 'deadline-overdue';
                    }
                    
                    const dateObj = new Date(project.deadline);
                    const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                    const day = String(dateObj.getDate()).padStart(2, '0');
                    formattedDate = `${month}/${day}`;
                }
                
                projectsHtml += `
                <div class="project-card">
                    <div class="project-header" onclick="goToProject(${project.id})">
                        <div class="project-info">
                            <div class="project-name">
                                <span class="project-checkbox ${isCompleted ? 'checked' : ''}" 
                                      onclick="event.stopPropagation(); toggleProjectComplete(${project.id})">
                                    ${isCompleted ? '✓' : ''}
                                </span>
                                ${projectName}
                            </div>
                        </div>
                        <div class="project-actions" onclick="event.stopPropagation()">
                            <button class="project-edit-btn" onclick="editProject(event, ${project.id})">✎</button>
                            <button class="project-delete-btn" onclick="deleteProject(event, ${project.id})">✕</button>
                        </div>
                    </div>
                    
                    <div class="project-remark-row">
                        <span class="remark-text">${projectTarget || ''}</span>
                    </div>
                    
                    <div class="progress-section" onclick="event.stopPropagation()">
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" style="width: ${progressPercent}%;"></div>
                        </div>
                        
                        <div class="progress-controls">
                            <div class="progress-value">
                                ${project.deadline ? `
                                <span class="deadline-chip ${deadlineClass}">
                                    <span class="deadline-chip-date">${formattedDate}</span>
                                    <span class="deadline-chip-text">${deadlineText}</span>
                                </span>
                                ` : ''}
                                ${project.progressCurrent || 0}/${project.progressTarget} ${project.progressUnit || ''}
                            </div>
                            <div class="button-group">
                                <button class="control-btn" onclick="updateProgress(${project.id}, -1); event.stopPropagation();" ${project.progressCurrent <= 0 ? 'disabled' : ''}>−</button>
                                <span class="current-count">${project.progressCurrent || 0}</span>
                                <button class="control-btn" onclick="updateProgress(${project.id}, 1); event.stopPropagation();" ${project.progressCurrent >= project.progressTarget ? 'disabled' : ''}>+</button>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }
            
            return `
                <div class="page">
                    <div class="main-goal-card">
                        <div class="goal-display" onclick="openEditGoalModal()">
                            <span class="goal-icon">🎯</span>
                            <span class="goal-text">${toSafeString(mainGoal)}</span>
                            <span class="edit-hint">点击修改</span>
                        </div>
                    </div>

                    <div class="projects-header">
                        <h3 class="section-title">我的项目</h3>
                        <button class="add-project-btn" onclick="openAddProjectModal()">+ 新建</button>
                    </div>

                    <div class="projects-list">
                        ${projects.length > 0 ? projectsHtml : '<div style="text-align: center; color: #999; padding: 20px;">暂无项目，点击"新建"添加</div>'}
                    </div>

                    <div class="summary-card">
                        <h4 class="summary-title">总体进度</h4>
                        <div class="progress-bar">

        function renderMonthlyView() {
            const project = projects.find(p => p.id === currentProjectId);
            if (!project) {
                currentPage = 'home';
                return renderHome();
            }

            const [year, month] = currentMonth.split('-').map(Number);
            const daysInMonth = getDaysInMonth(year, month - 1);
            const key = currentProjectId + '_' + currentMonth;
            const records = dailyRecords[key] || {};
            const today = new Date();
            const todayStr = today.toISOString().slice(0, 7);
            const todayDay = today.getDate();

            let daysWithContent = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                if (hasContent(records[d])) daysWithContent++;
            }
            const progress = Math.round((daysWithContent / daysInMonth) * 100);

            let daysRows = '';
            for (let day = 1; day <= daysInMonth; day++) {
                const isToday = currentMonth === todayStr && day === todayDay;
                const content = toSafeString(records[day]);
                const weekday = getWeekday(year, month, day);
                
                const todayClass = isToday ? 'today-date' : '';
                const contentClass = isToday ? 'today-content' : '';
                const escapedContent = content.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                daysRows += `
                    <div class="date-row">
                        <div class="date-column ${todayClass}">
                            <span class="date-day">${day}</span>
                            <span class="date-week">${weekday}</span>
                        </div>
                        <div class="content-column ${contentClass}">
                            <div class="record-text-wrapper">
                                <div class="record-text">${content.replace(/</g, '&lt;')}</div>
                            </div>
                            <button class="edit-btn" onclick="openRecordModal(${day}, '${escapedContent}')">✎</button>
                        </div>
                    </div>
                `;
            }

            const todoKey = currentProjectId.toString();
            let todos = todoItems[todoKey] || [];

            for (let i = 0; i < todos.length; i++) {
                const todo = todos[i];
                if (!todo.target || todo.target <= 0 || isNaN(todo.target)) {
                    delete todo.progress;
                    delete todo.target;
                    delete todo.unit;
                }
            }

            const incompleteCount = todos.length;
            const expanded = todoExpanded[currentProjectId] !== false;

            let todoItemsHtml = '';

            if (todos.length > 0) {
                for (let i = 0; i < todos.length; i++) {
                    const todo = todos[i];
                    
                    const hasProgress = todo.target !== undefined && todo.target > 0;
                    
                    let tagsHtml = '';
                    if (todo.tags && todo.tags.length > 0) {
                        for (let j = 0; j < todo.tags.length; j++) {
                            tagsHtml += `<span class="todo-tag">${toSafeString(todo.tags[j])}</span>`;
                        }
                    }
                    
                    let todoHtml = `
                        <div class="todo-item" onclick="openEditTodoModal(${currentProjectId}, ${todo.id})">
                            <div class="todo-checkbox ${hasProgress && todo.progress >= todo.target ? 'checked' : ''}" 
                                 onclick="event.stopPropagation(); toggleTodoComplete(${currentProjectId}, ${todo.id})">
                            </div>
                            
                            <div class="todo-content">
                                <div class="todo-header-row">
                                    <div class="todo-text ${hasProgress && todo.progress >= todo.target ? 'completed' : ''}">${toSafeString(todo.text)}</div>
                                    <div class="todo-actions" onclick="event.stopPropagation()">
                                        ${tagsHtml ? `<div class="todo-tags">${tagsHtml}</div>` : ''}
                                        <button class="todo-delete-btn" onclick="deleteTodo(${currentProjectId}, ${todo.id})">✕</button>
                                    </div>
                                </div>
                    `;
                    
                    if (hasProgress) {
                        const progressPercent = Math.round((todo.progress / todo.target) * 100);
                        todoHtml += `
                                <div class="todo-progress-section" onclick="event.stopPropagation()">
                                    <div class="todo-progress-bar-container">
                                        <div class="todo-progress-bar-fill" style="width: ${progressPercent}%;"></div>
                                    </div>
                                    
                                    <div class="todo-progress-controls">
                                        <span class="todo-progress-value">${todo.progress}/${todo.target} ${todo.unit || ''}</span>
                                        <div class="todo-button-group">
                                            <button class="todo-control-btn" onclick="updateTodoProgress(${currentProjectId}, ${todo.id}, -1); event.stopPropagation();" ${todo.progress <= 0 ? 'disabled' : ''}>−</button>
                                            <span class="todo-current-progress">${todo.progress}</span>
                                            <button class="todo-control-btn" onclick="updateTodoProgress(${currentProjectId}, ${todo.id}, 1); event.stopPropagation();" ${todo.progress >= todo.target ? 'disabled' : ''}>+</button>
                                        </div>
                                    </div>
                                </div>
                        `;
                    }
                    
                    todoHtml += `
                            </div>
                        </div>
                    `;
                    
                    todoItemsHtml += todoHtml;
                }
            } else {
                todoItemsHtml = '<div style="text-align: center; color: #999; padding: 16px 0;">暂无待办，点击"+"添加</div>';
            }

            return `
                <div class="page">
                    <div class="month-header">
                        <button class="nav-btn" onclick="goToHome()">← 返回</button>
                        <h2 class="project-title">${toSafeString(project.name)}</h2>
                    </div>

                    <div class="stats-card">
                        <div class="month-nav">
                            <button class="month-btn" onclick="changeMonth(-1)">◀ 上月</button>
                            <span class="current-month">${currentMonth}</span>
                            <button class="month-btn" onclick="changeMonth(1)">下月 ▶</button>
                        </div>
                        <div class="progress-info">
                            <span>本月打卡</span>
                            <span>${daysWithContent}/${daysInMonth} 天</span>
                        </div>
                        <div class="month-progress-bar">
                            <div class="month-progress-fill" style="width: ${progress}%;"></div>
                        </div>
                    </div>

                    <div class="todo-section">
                        <div class="todo-header" onclick="toggleTodoSection(${currentProjectId})">
                            <div class="todo-title-wrapper">
                                <span class="todo-title">待办事项</span>
                                <span class="todo-count">${incompleteCount}</span>
                            </div>
                            <button class="todo-add-btn" onclick="event.stopPropagation(); openAddTodoModal()">+</button>
                        </div>
                        <div class="todo-list ${expanded ? '' : 'collapsed'}">
                            ${todoItemsHtml}
                        </div>
                    </div>

                    <div class="daily-records">
                        <h3 class="records-title">每日记录</h3>
                        ${daysRows}
                    </div>
                </div>
            `;
        }

        window.setQuickDeadline = function(option) {
            const deadlineInput = document.getElementById('project-deadline-input') || document.getElementById('edit-project-deadline');
            if (!deadlineInput) return;
            
            const today = new Date();
            let targetDate = new Date();
            
            switch(option) {
                case 'today':
                    break;
                case 'tomorrow':
                    targetDate.setDate(today.getDate() + 1);
                    break;
                case 'week':
                    targetDate.setDate(today.getDate() + 7);
                    break;
                case 'month':
                    targetDate.setDate(today.getDate() + 30);
                    break;
            }
            
            const year = targetDate.getFullYear();
            const month = String(targetDate.getMonth() + 1).padStart(2, '0');
            const day = String(targetDate.getDate()).padStart(2, '0');
            deadlineInput.value = `${year}-${month}-${day}`;
        };

        window.clearDeadline = function() {
            const deadlineInput = document.getElementById('edit-project-deadline');

                deadlineInput.value = '';

            currentProjectId = null;

            currentPage = 'project';

            render();
        };

        };

            showEditGoalModal = false;
            render();
        };

            const input = document.getElementById('goal-input');
            if (input?.value.trim()) {
                mainGoal = input.value.trim();
                saveData();
            }
            showEditGoalModal = false;
            render();
        };

        window.openAddProjectModal = function() {
            showAddProjectModal = true;
            render();
            setTimeout(() => document.getElementById('project-name-input')?.focus(), 100);
        };

            showAddProjectModal = false;
            render();
        };

        window.saveProjectAdd = function() {
            const nameInput = document.getElementById('project-name-input');
            const targetInput = document.getElementById('project-target-input');
            const targetNumber = document.getElementById('project-target-number');
            const unitInput = document.getElementById('project-unit');
            const deadlineInput = document.getElementById('project-deadline-input');
            
            if (nameInput?.value.trim()) {
                const targetNum = parseInt(targetNumber?.value) || 10;
                projects.push({
                    id: Date.now(),
                    name: nameInput.value.trim(),
                    target: targetInput?.value.trim() || '',
                    progressTarget: targetNum,
                    progressCurrent: 0,
                    progressUnit: unitInput?.value || '件',
                    deadline: deadlineInput?.value || null
                });
                saveData();
                console.log('项目已保存到本地', projects);
            }
            showAddProjectModal = false;
            render();
        };

        window.editProject = function(event, projectId) {
            event.stopPropagation();
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            
            currentEditProjectId = projectId;
            showEditProjectModal = true;
            render();
            
            setTimeout(() => {
                document.getElementById('edit-project-name').value = project.name || '';
                document.getElementById('edit-project-target').value = project.target || '';
                document.getElementById('edit-project-target-number').value = project.progressTarget || 10;
                document.getElementById('edit-project-unit').value = project.progressUnit || '件';
                document.getElementById('edit-project-current').value = project.progressCurrent || 0;
                document.getElementById('edit-project-deadline').value = project.deadline || new Date().toISOString().split('T')[0];
            }, 100);
        };

        window.closeEditProjectModal = function() {
            showEditProjectModal = false;
            currentEditProjectId = null;
            render();
        };

        window.saveProjectEdit = function() {
            if (!currentEditProjectId) return;
            
            const project = projects.find(p => p.id === currentEditProjectId);
            if (!project) return;
            
            const nameInput = document.getElementById('edit-project-name');
            const targetInput = document.getElementById('edit-project-target');
            const targetNumberInput = document.getElementById('edit-project-target-number');
            const unitInput = document.getElementById('edit-project-unit');
            const currentInput = document.getElementById('edit-project-current');
            const deadlineInput = document.getElementById('edit-project-deadline');
            
            if (nameInput?.value.trim()) {
                project.name = nameInput.value.trim();
            }
            
            if (targetInput) {
                project.target = targetInput.value.trim() || '';
            }
            
            if (deadlineInput) {
                project.deadline = deadlineInput.value || null;
            }
            
            if (targetNumberInput?.value) {
                const num = parseInt(targetNumberInput.value);
                if (!isNaN(num) && num > 0) {
                    project.progressTarget = num;
                }
            }
            
            if (unitInput?.value.trim()) {
                project.progressUnit = unitInput.value.trim();
            }
            
            if (currentInput?.value) {
                const num = parseInt(currentInput.value);
                if (!isNaN(num) && num >= 0) {
                    project.progressCurrent = Math.min(num, project.progressTarget);
                }
            }
            
            saveData();
            showEditProjectModal = false;
            currentEditProjectId = null;
            render();
        };

        window.deleteProject = function(event, projectId) {
            event.stopPropagation();
            if (confirm('确定删除这个项目吗？')) {
                projects = projects.filter(p => p.id !== projectId);
                delete todoItems[projectId.toString()];
                saveData();
                if (currentPage === 'project' && currentProjectId === projectId) {
                    goToHome();
                } else {
                    render();
                }
            }
        };

        window.updateProgress = updateProgress;

        window.changeMonth = function(delta) {
            const [year, month] = currentMonth.split('-').map(Number);
            const newDate = new Date(year, month - 1 + delta, 1);
            currentMonth = newDate.getFullYear() + '-' + String(newDate.getMonth() + 1).padStart(2, '0');
            render();
        };

        window.openAddTodoModal = openAddTodoModal;
        window.openEditTodoModal = openEditTodoModal;
        window.saveEditTodo = saveEditTodo;
        window.updateTodoProgress = updateTodoProgress;
        window.toggleTodoComplete = toggleTodoComplete;
        window.deleteTodo = deleteTodo;
        window.toggleTodoSection = toggleTodoSection;
        window.openSettingsModal = openSettingsModal;
        window.closeSettingsModal = closeSettingsModal;
        window.saveSettings = saveSettings;
        window.syncToGist = syncToGist;
        window.restoreFromGist = restoreFromGist;
        window.exportDataToFile = exportDataToFile;
        window.importDataFromFile = importDataFromFile;
        window.showBackupManager = showBackupManager;

        function init() {
            loadData();
            
            const storageStatus = checkStorageStatus();
            console.log('存储状态:', storageStatus);
            
            if (!storageStatus.localStorage) {
                alert('您的浏览器不支持本地存储或处于无痕模式，数据将无法保存！\n建议：\n1. 关闭无痕模式\n2. 将网页添加到主屏幕');
            }
            
            setInterval(autoBackup, AUTO_BACKUP_CONFIG.backupInterval);
            
            window.addEventListener('beforeunload', function() {
                saveData();
                autoBackup();
            });
            
            render();
        }

        init();
    </script>
