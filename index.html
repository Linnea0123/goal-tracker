        /* 左侧弹窗 */
.sidebar-modal {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 280px;
    background: white;
    z-index: 2000;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    box-shadow: 2px 0 12px rgba(0,0,0,0.1);
    border-radius: 0 20px 20px 0;
}
.sidebar-modal.active {
    transform: translateX(0);
}
.sidebar-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 1999;
    visibility: hidden;
    opacity: 0;
    transition: visibility 0.3s, opacity 0.3s;
}
.sidebar-overlay.active {
    visibility: visible;
    opacity: 1;
}
.sidebar-header {
    padding: 24px 20px;
    font-size: 20px;
    font-weight: 700;
    border-bottom: 1px solid #e2e8f0;
}
.sidebar-content {
    padding: 20px;
}
.setting-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #f0f2f5;
}
.setting-label {
    font-size: 15px;
    font-weight: 500;
    color: #1e293b;
}
/* 开关按钮 */
.switch {
    position: relative;
    display: inline-block;
    width: 48px;
    height: 24px;
}
.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}
.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #cbd5e1;
    transition: 0.3s;
    border-radius: 24px;
}
.slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 2px;
    bottom: 2px;
    background-color: white;
    transition: 0.3s;
    border-radius: 50%;
}
input:checked + .slider {
    background-color: #FA8C57;
}
input:checked + .slider:before {
    transform: translateX(24px);
}

        /* 筛选弹窗 */
.filter-modal .modal-container {
    max-width: 260px;
}
.filter-option {
    padding: 12px 16px;
    text-align: center;
    cursor: pointer;
    border-radius: 40px;
    margin: 4px 0;
    font-size: 14px;
    font-weight: 500;
}
.filter-option:hover {
    background: #f1f5f9;
}
.filter-option.active {
    background: #FA8C57;
    color: white;
}
.filter-option.clear-filter {
    color: #ef4444;
    border-top: 1px solid #e2e8f0;
    margin-top: 8px;
    padding-top: 12px;
}

        /* 已完成任务的文字样式：变灰 + 删除线 */
.completed-text {

    color: #94a3b8 !important;

// 获取某周的第一天（周一）的日期
function getWeekDates(year, weekNum) {
    // 简单实现：假设2026年第15周从4月6日（周一）开始
    // 第15周：4月6日（周一）到4月12日（周日）
    const baseDate = new Date(2026, 3, 6); // 4月6日，周一
    const daysOffset = (weekNum - 15) * 7;
    const monday = new Date(2026, 3, 6 + daysOffset);
    return {
        monday: monday.getDate(),
        tuesday: monday.getDate() + 1,
        wednesday: monday.getDate() + 2,
        thursday: monday.getDate() + 3,
        friday: monday.getDate() + 4,
        saturday: monday.getDate() + 5,
        sunday: monday.getDate() + 6,
        month: monday.getMonth() + 1
    };
}

function updateWeekDates() {
    const dates = getWeekDates(currentYear, currentWeek);
    document.querySelector('.day-card[data-day-key="monday"] .day-number').innerText = dates.monday;
    document.querySelector('.day-card[data-day-key="tuesday"] .day-number').innerText = dates.tuesday;
    document.querySelector('.day-card[data-day-key="wednesday"] .day-number').innerText = dates.wednesday;
    document.querySelector('.day-card[data-day-key="thursday"] .day-number').innerText = dates.thursday;
    document.querySelector('.day-card[data-day-key="friday"] .day-number').innerText = dates.friday;
    document.querySelector('.day-card[data-day-key="saturday"] .day-number').innerText = dates.saturday;
    document.querySelector('.day-card[data-day-key="sunday"] .day-number').innerText = dates.sunday;
    document.getElementById('weekNumber').innerText = currentWeek;
    document.getElementById('monthDisplay').innerText = dates.month + '月';
    
   // 添加红色圆点标识当前周
    const weekTitle = document.querySelector('.week-title');
    // 移除已有的圆点
    const existingDot = document.querySelector('.week-dot');
    if (existingDot) existingDot.remove();
    
    // 如果是当前周（第15周），添加红色圆点
    if (currentWeek === 15) {
        const dot = document.createElement('span');
        dot.className = 'week-dot';
        dot.innerHTML = ' ●';
        dot.style.color = '#ef4444';
        dot.style.fontSize = '20px';
        dot.style.marginLeft = '6px';
        dot.style.verticalAlign = 'middle';
        weekTitle.appendChild(dot);
    }
}

// 切换周
function goPrevWeek() {
    currentWeek--;
    updateWeekDates();
}

function goNextWeek() {
    currentWeek++;
    updateWeekDates();

            function escapeHtml(str) {
                return str.replace(/[&<>]/g, function(m) {
                    if(m === '&') return '&amp;';
                    if(m === '<') return '&lt;';
                    if(m === '>') return '&gt;';
                    return m;
                });
            }

            function addTaskToCard(cardKey, taskText, tag) {
                if (!taskText.trim()) {
                    alert('请填写任务内容');
                    return false;
                }
                const newTask = {
                    id: Date.now() + Math.random() * 10000,
                    text: taskText.trim(),
                    completed: false,
                    tag: tag
                };
                tasksDB[cardKey].push(newTask);
                renderTasks(cardKey);
                return true;
            }

            function toggleTaskComplete(cardKey, taskId) {
                const task = tasksDB[cardKey].find(t => t.id == taskId);
                if (task) {
                    task.completed = !task.completed;
                    renderTasks(cardKey);
                }
            }

            function deleteTaskById(cardKey, taskId) {
                const idx = tasksDB[cardKey].findIndex(t => t.id == taskId);
                if (idx !== -1) {
                    tasksDB[cardKey].splice(idx, 1);
                    renderTasks(cardKey);
                }
            }

            function openModalForCard(cardKey) {
                activeCardKey = cardKey;
                taskInput.value = '';
                selectedTag = '生活';
                updateTagUI();
                modal.classList.add('active');
                taskInput.focus();
            }

            function closeModal() {
                modal.classList.remove('active');
                activeCardKey = null;
            }

            function updateTagUI() {
                tagOptions.forEach(opt => {
                    const tagVal = opt.getAttribute('data-tag');
                    if (tagVal === selectedTag) {
                        opt.classList.add('active');
                    } else {
                        opt.classList.remove('active');
                    }
                });
            }

            tagOptions.forEach(opt => {
                opt.addEventListener('click', () => {
                    const tagVal = opt.getAttribute('data-tag');
                    if (tagVal) {
                        selectedTag = tagVal;
                        updateTagUI();
                    }
                });
            });

            function handleConfirmAdd() {
                if (!activeCardKey) { closeModal(); return; }
                const content = taskInput.value.trim();
                if (!content) { alert('请填写待办事项内容'); return; }
                addTaskToCard(activeCardKey, content, selectedTag);
                closeModal();
            }

            function bindAddButtons() {

                        openModalForCard('unscheduled');
                    });

                dayAddBtns.forEach(btn => {

                        e.stopPropagation();
                        const dayCard = btn.closest('.day-card');
                        if (dayCard) {
                            const dayKey = dayCard.getAttribute('data-day-key');

            // 任务操作弹窗函数
            function showTaskActionModal(cardKey, task) {
                activeTask = task;

                if (taskActionModal) taskActionModal.classList.add('active');
            }

            function closeTaskActionModal() {
                if (taskActionModal) taskActionModal.classList.remove('active');
                activeTask = null;
                activeTaskCardKey = null;
            }

            function copyTask() {
                if (!activeTask || !activeTaskCardKey) return;
                const newTask = {
                    id: Date.now() + Math.random() * 10000,
                    text: activeTask.text,
                    completed: false,
                    tag: activeTask.tag
                };
                tasksDB[activeTaskCardKey].push(newTask);
                renderTasks(activeTaskCardKey);
                closeTaskActionModal();
            }

            function deleteTask() {
                if (!activeTask || !activeTaskCardKey) return;
                if (confirm('确定要删除这个任务吗？')) {
                    const idx = tasksDB[activeTaskCardKey].findIndex(t => t.id === activeTask.id);
                    if (idx !== -1) {
                        tasksDB[activeTaskCardKey].splice(idx, 1);
                        renderTasks(activeTaskCardKey);
                    }
                }
                closeTaskActionModal();
            }

            // 编辑弹窗函数
            function openEditModal(cardKey, task) {
                editingTask = task;
                editingTaskCardKey = cardKey;
                editingSelectedTag = task.tag;
                if (editTaskInput) editTaskInput.value = task.text;
                updateEditTagUI();
                if (editModal) editModal.classList.add('active');
                if (editTaskInput) editTaskInput.focus();
            }

            function closeEditModal() {
                if (editModal) editModal.classList.remove('active');
                editingTask = null;
                editingTaskCardKey = null;
            }

            function updateEditTagUI() {
                if (!editTagOptions) return;
                editTagOptions.forEach(opt => {
                    const tagVal = opt.getAttribute('data-tag');
                    if (tagVal === editingSelectedTag) {
                        opt.classList.add('active');
                    } else {
                        opt.classList.remove('active');
                    }
                });
            }

            function saveEditTask() {
                if (!editingTask || !editingTaskCardKey) return;
                const newText = editTaskInput ? editTaskInput.value.trim() : '';
                if (!newText) {
                    alert('请填写任务内容');

                renderTasks(editingTaskCardKey);

    closeTaskActionModal();

    openEditModal(cardKeyForEdit, taskToEdit);
}
