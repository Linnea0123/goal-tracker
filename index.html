<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拾句 · 极简集藏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 防止 iOS 下输入框自动缩放 */
        input, textarea, select {
            font-size: 16px !important;
        }

        body {
            background-color: #f5f4f2;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: #2e2c29;
            padding: 20px 16px 48px;
            min-height: 100vh;
        }

        .app, .page-container {
            max-width: 960px;
            margin: 0 auto;
            width: 100%;
        }

        /* 头部区域：标题 + 设置按钮 */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header {
            flex: 1;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 380;
            letter-spacing: -0.5px;
            color: #3a3834;
        }
        .sub {
            font-size: 0.7rem;
            color: #99948c;
            margin-top: 4px;
            font-weight: 350;
        }
        
        /* 设置按钮 - 无边框无圆圈 */
        .settings-icon {
            background: transparent;
            border: none;
            width: auto;
            height: auto;
            padding: 8px 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            color: #5f5a53;
            transition: 0.1s;
            border-radius: 32px;
        }
        .settings-icon:active { 
            background-color: #ece9e4; 
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-outline {
            background: transparent;
            border: 0.5px solid #d6d2cb;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 380;
            color: #5f5a53;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-outline:active { background-color: #ece9e4; }
        .btn-outline.active {
            background-color: #e3dfd9;
            border-color: #c2bcb3;
            color: #2f2c28;
        }

        /* 两列布局 - 手机端和桌面统一 */
        .two-columns {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .col {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 一级分类卡片 - 紧凑 */
        .primary-cat {
            background: #ffffff;
            border-radius: 18px;
            border: 0.5px solid #e8e4df;
            overflow: hidden;
        }
        .primary-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            cursor: pointer;
            background-color: #fefdfc;
        }
        .primary-header:active { background-color: #f5f3ef; }
        .primary-title {
            font-size: 0.95rem;
            font-weight: 470;
            color: #3d3a36;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .collapse-icon {
            font-size: 0.75rem;
            color: #b0aaa1;
            width: 18px;
        }
        .primary-actions { display: flex; gap: 6px; }
        .icon-btn {
            background: transparent;
            border: none;
            font-size: 0.65rem;
            color: #8e897f;
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 30px;
        }
        .icon-btn:active { background-color: #eae7e1; }
        .edit-mode-only { display: none; }
        body.edit-mode .edit-mode-only { display: inline-flex; gap: 4px; }

        .secondary-area {
            border-top: 0.5px solid #efebe6;
            background: #ffffff;
            padding: 10px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .secondary-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #faf9f7;
            border-radius: 32px;
            padding: 6px 12px;
            cursor: pointer;
            border: 0.5px solid #f0ede8;
        }
        .secondary-item:active { background-color: #efede8; }
        .secondary-name { 
            font-size: 0.8rem; 
            font-weight: 420; 
            color: #5e5952; 
            flex: 1;
        }
        .edit-actions { display: flex; gap: 5px; }
        .empty-sub { font-size: 0.7rem; color: #bbb4ab; text-align: center; padding: 8px 0; }

        /* 句子页面 - 无背景框，序号紧凑 */
        .sentence-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f5f4f2;
            z-index: 1050;
            overflow-y: auto;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease, visibility 0s linear 0.2s;
            padding: 20px 16px 30px;
        }
        .sentence-page.open { visibility: visible; opacity: 1; transition: opacity 0.2s ease; }
        .page-container {
            background: transparent;
            border-radius: 0;
            padding: 0;
            border: none;
            max-width: 960px;
            margin: 0 auto;
            width: 100%;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 0.5px solid #e3dfd9;
            flex-wrap: wrap;
            gap: 10px;
        }
        .page-title { 
            font-size: 1.3rem; 
            font-weight: 420; 
            color: #3d3a36;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn, .print-btn-page {
            background: transparent;
            border: none;
            font-size: 0.85rem;
            color: #9b958c;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 40px;
            transition: 0.1s;
        }
        .back-btn:active, .print-btn-page:active { background: #ece9e4; }
        .print-btn-page {
            font-size: 1.1rem;
            padding: 6px 8px;
        }
        
        /* 句子列表 - 极简，序号和文字距离极小 */
        .sentence-list-page {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 8px 0 20px;
            min-height: 280px;
        }
        .sentence-card {
    padding: 4px 0;
    background: transparent;
    border-radius: 0;
    border: none;
    font-size: 0.9rem;
    line-height: 1.45;
    color: #3c3935;
    position: relative;
    display: flex;
    align-items: center;      /* 垂直居中对齐 */
    gap: 2px;                /* 进一步缩小间距 */
    cursor: pointer;
    transition: opacity 0.1s;
    border-bottom: 0.5px solid #efebe6;
}

.sentence-index {
    font-size: 0.75rem;
    font-weight: 400;
    color: #b8b0a4;
    min-width: 26px;         /* 宽度可以再小一点 */
    letter-spacing: 0;
    line-height: 1.45;       /* 与文字行高一致，确保对齐 */
}
        .sentence-card:active { opacity: 0.6; background: transparent; }
        .sentence-index {
            font-size: 0.75rem;
            font-weight: 400;
            color: #b8b0a4;
            min-width: 30px;
            letter-spacing: 0.2px;
        }
        .sentence-text { 
            flex: 1; 
            word-break: break-word;
        }
        .empty-placeholder { 
            text-align: center; 
            padding: 40px 20px; 
            color: #bbb3a8; 
            font-size: 0.8rem; 
        }
        
        /* 添加句子区域 */
        .add-form {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 0.5px solid #e3dfd9;
        }
        .add-form input { 
            flex: 1; 
            padding: 10px 14px; 
            border: 0.5px solid #e0dbd3; 
            border-radius: 40px; 
            font-size: 16px !important; /* 防止缩放 */
            background: #ffffff; 
            font-family: inherit;
        }
        .add-form input:focus { outline: none; border-color: #cfc8be; }
        .small-round-btn { 
            background: #efede8; 
            border: none; 
            padding: 7px 18px; 
            border-radius: 40px; 
            font-size: 0.75rem; 
            color: #56524b; 
            cursor: pointer;
        }
        .small-round-btn:active { background: #e4e0d9; }

        /* 浮动菜单 */
        .action-menu {
            position: fixed;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
            border: 0.5px solid #e8e4df;
            padding: 6px 0;
            min-width: 130px;
            z-index: 1200;
            visibility: hidden;
            opacity: 0;
            transition: 0.1s;
        }
        .action-menu.active { visibility: visible; opacity: 1; }
        .action-menu button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 10px 18px;
            background: none;
            border: none;
            font-size: 0.8rem;
            color: #3d3a36;
            cursor: pointer;
        }
        .action-menu button:active { background-color: #f5f3ef; }

        /* 设置模态框 */
        .settings-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            z-index: 1300;
            visibility: hidden;
            opacity: 0;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-modal.active { visibility: visible; opacity: 1; }
        .settings-card {
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 36px;
            padding: 24px 22px;
            border: 0.5px solid #eae6e0;
        }
        .settings-card h3 { font-weight: 420; margin-bottom: 18px; font-size: 1.2rem; }
        .settings-card input { width: 100%; padding: 10px 12px; border: 0.5px solid #ddd8d0; border-radius: 60px; margin: 10px 0; font-size: 16px !important; }
        .settings-card button { margin-top: 8px; width: 100%; padding: 9px; border-radius: 60px; background: #efede8; border: none; cursor: pointer; font-size: 0.8rem; }
        .status-msg { font-size: 0.7rem; color: #8f8a82; margin-top: 10px; text-align: center; }
        
        /* 全局打印按钮已移除，改为页面内按钮 */
        
        /* 通用模态框 */
        .modal-mask, .dialog-card { position: fixed; z-index: 1250; }
        .modal-mask { top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.15);backdrop-filter:blur(2px);visibility:hidden;opacity:0;transition:0.15s; }
        .modal-mask.active { visibility:visible;opacity:1; }
        .dialog-card { top:50%;left:50%;transform:translate(-50%,-50%);background:white;width:270px;max-width:85%;padding:22px 18px;border-radius:32px;text-align:center;visibility:hidden;opacity:0;transition:0.1s; }
        .dialog-card.active { visibility:visible;opacity:1; }
        .dialog-card input { width:100%;padding:10px 12px;margin:14px 0;border:0.5px solid #ddd8d0;border-radius:60px;font-size:16px !important; }
        .dialog-buttons { display: flex; gap: 10px; justify-content: center; }
        
        /* 响应式：手机端保持和桌面完全一致的布局和间距 */
        @media (max-width: 640px) {
            body { padding: 16px 12px 40px; }
            .two-columns { gap: 12px; }
            .col { gap: 10px; }
            .primary-header { padding: 10px 12px; }
            .primary-title { font-size: 0.85rem; }
            .secondary-area { padding: 8px 10px 10px; gap: 6px; }
            .secondary-item { padding: 5px 10px; }
            .secondary-name { font-size: 0.75rem; }
           .sentence-card { gap: 2px; padding: 4px 0; align-items: center; }
    .sentence-index { min-width: 24px; font-size: 0.7rem; line-height: 1.45; }
            .sentence-text { font-size: 0.85rem; }
            .page-title { font-size: 1.2rem; }
        }
        
        @media print {
            body * { visibility:hidden; }
            .app, .sentence-page, .sentence-page * { visibility:visible; }
            .sentence-page { position:relative; opacity:1; background:white; padding:0; }
            .toolbar,.settings-modal,.action-menu,.add-form,.edit-mode-only,.header-actions{ display:none; }
            .sentence-card { border-bottom: 0.5px solid #ccc; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header-row">
        <div class="header">
            <h1>拾句·集藏</h1>
            <div class="sub">素简字句 · 静默收录</div>
        </div>
        <div id="settingsBtn" class="settings-icon">⚙️</div>
    </div>
    <div class="toolbar">
        <button id="addPrimaryBtn" class="btn-outline">+ 新增类别</button>
        <button id="toggleEditBtn" class="btn-outline">编辑模式</button>
    </div>
    <div id="categoriesContainer" class="two-columns"></div>
</div>

<!-- 句子页面 -->
<div id="sentencePage" class="sentence-page">
    <div class="page-container">
        <div class="page-header">
            <span class="page-title" id="pageCategoryTitle">——</span>
            <div class="header-actions">
                <button id="printPageBtn" class="print-btn-page" title="打印句子">🖨️</button>
                <button id="closePageBtn" class="back-btn">← 返回</button>
            </div>
        </div>
        <div id="sentencePageList" class="sentence-list-page"></div>
        <div class="add-form">
            <input type="text" id="pageSentenceInput" placeholder="写下一句好词好句..." autocomplete="off">
            <button id="pageAddSentenceBtn" class="small-round-btn">留存</button>
        </div>
    </div>
</div>

<!-- 句子操作浮动菜单 -->
<div id="actionMenu" class="action-menu">
    <button id="menuEdit">✏️ 编辑</button>
    <button id="menuDelete">🗑️ 删除</button>
    <button id="menuCopy">📋 复制</button>
</div>

<!-- 设置面板 -->
<div id="settingsModal" class="settings-modal">
    <div class="settings-card">
        <h3>云端同步 · Gist</h3>
        <input type="text" id="gistToken" placeholder="GitHub Personal Access Token">
        <input type="text" id="gistId" placeholder="Gist ID (可选)">
        <button id="syncToGist">☁️ 上传备份</button>
        <button id="restoreFromGist">⬇️ 恢复云端</button>
        <div id="syncStatus" class="status-msg"></div>
        <button id="closeSettings" style="margin-top:20px;background:transparent;">关闭</button>
    </div>
</div>

<div id="modalMask" class="modal-mask"></div>
<div id="commonDialog" class="dialog-card">
    <h4 id="dialogTitle">新建分类</h4>
    <input type="text" id="dialogInput" placeholder="名称">
    <div class="dialog-buttons">
        <button id="dialogConfirmBtn" class="small-round-btn">确认</button>
        <button id="dialogCancelBtn" class="small-round-btn">取消</button>
    </div>
</div>

<script>
    // ---------- 数据结构 ----------
    let categories = [];
    let currentMenuContext = null;
    let currentPageRef = null;

    function genId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 8); }

    // 默认数据
    const defaultRaw = [
        { id: genId(), name: "天气", collapsed: true, children: [{ id: genId(), name: "晴", sentences: ["晴空一鹤排云上，便引诗情到碧霄。","阳光清澈，万物可亲。"] },{ id: genId(), name: "雨", sentences: ["梧桐更兼细雨，到黄昏点点滴滴。","雨声潺潺，像住在溪边。"] },{ id: genId(), name: "雪", sentences: ["忽如一夜春风来，千树万树梨花开。","雪落无声，洗净尘嚣。"] },{ id: genId(), name: "风", sentences: ["吹面不寒杨柳风。","风声低语，穿堂而过。"] },{ id: genId(), name: "阴", sentences: ["霭霭停云，濛濛时雨。","天色沉静，内心安宁。"] }] },
        { id: genId(), name: "天空", collapsed: true, children: [{ id: genId(), name: "太阳", sentences: ["日出江花红胜火。","太阳温柔沉没，余晖浸染。"] },{ id: genId(), name: "月亮", sentences: ["但愿人长久，千里共婵娟。","月色如水，照见孤影。"] },{ id: genId(), name: "星星", sentences: ["星垂平野阔。","满天星光，微芒不灭。"] },{ id: genId(), name: "云朵", sentences: ["云想衣裳花想容。","云朵舒卷，自在如风。"] },{ id: genId(), name: "彩虹", sentences: ["彩虹横跨，片刻绚烂。"] }] },
        { id: genId(), name: "植物", collapsed: true, children: [{ id: genId(), name: "花", sentences: ["花开堪折直须折。","花朵不语，自有芬芳。"] },{ id: genId(), name: "树", sentences: ["树深时见鹿。","一棵树的沉默与生长。"] },{ id: genId(), name: "草", sentences: ["离离原上草。","野草坚韧，枯荣有时。"] },{ id: genId(), name: "果子", sentences: ["梅子金黄杏子肥。","果实坠枝，秋意饱满。"] },{ id: genId(), name: "叶子", sentences: ["一叶落而知秋。"] }] },
        { id: genId(), name: "动物", collapsed: true, children: [{ id: genId(), name: "猫", sentences: ["猫步轻悄，悠然自得。","午后的猫，蜷成句号。"] },{ id: genId(), name: "狗", sentences: ["忠犬无声，陪伴长情。"] },{ id: genId(), name: "鱼", sentences: ["相濡以沫，不如相忘于江湖。"] },{ id: genId(), name: "鸟", sentences: ["山光悦鸟性。","飞鸟掠过，不留痕迹。"] },{ id: genId(), name: "虫", sentences: ["夏虫不可语冰。","虫鸣织夜，细碎热闹。"] }] },
        { id: genId(), name: "心情", collapsed: true, children: [{ id: genId(), name: "开心", sentences: ["春风得意马蹄疾。","心底有光，眉目舒展。"] },{ id: genId(), name: "难过", sentences: ["此情无计可消除。","眼泪是沉默的雨。"] },{ id: genId(), name: "生气", sentences: ["怒发冲冠凭栏处。"] },{ id: genId(), name: "害怕", sentences: ["战战兢兢，如临深渊。"] }] },
        { id: genId(), name: "四季", collapsed: true, children: [{ id: genId(), name: "春", sentences: ["春水初生，春林初盛。"] },{ id: genId(), name: "夏", sentences: ["绿树阴浓夏日长。"] },{ id: genId(), name: "秋", sentences: ["秋水共长天一色。"] },{ id: genId(), name: "冬", sentences: ["冬宜密雪，有碎玉声。"] }] },
        { id: genId(), name: "自然", collapsed: true, children: [{ id: genId(), name: "水", sentences: ["上善若水。","流水不争先。"] },{ id: genId(), name: "山", sentences: ["会当凌绝顶。","山静无言。"] }] }
    ];

    function loadData() {
        const stored = localStorage.getItem('dual_column_quote_hub');
        if(stored) { try { categories = JSON.parse(stored); categories.forEach(c => { if(c.collapsed === undefined) c.collapsed = true; }); if(!categories.length) throw new Error(); } catch(e) { categories = JSON.parse(JSON.stringify(defaultRaw)); } } 
        else { categories = JSON.parse(JSON.stringify(defaultRaw)); }
        renderMain();
    }
    function saveData() { localStorage.setItem('dual_column_quote_hub', JSON.stringify(categories)); }

    function splitIntoColumns(arr) { const left=[], right=[]; arr.forEach((item,idx)=>{ if(idx%2===0) left.push(item); else right.push(item); }); return {left,right}; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    function renderMain() {
        const container = document.getElementById('categoriesContainer'); if(!container) return;
        const isEditMode = document.body.classList.contains('edit-mode');
        if(categories.length===0) { container.innerHTML='<div class="empty-placeholder">暂无分类</div>'; return; }
        const {left,right}=splitIntoColumns(categories);
        const renderCol = (items) => items.map(primary=>{
            const collapsed=primary.collapsed; const icon=collapsed?'▶':'▼';
            const childrenHtml = !collapsed ? `<div class="secondary-area">${primary.children?.length ? primary.children.map(sec=>`
                <div class="secondary-item" data-pid="${primary.id}" data-secid="${sec.id}" data-secname="${escapeHtml(sec.name)}">
                    <span class="secondary-name">${escapeHtml(sec.name)}</span>
                    ${isEditMode?`<div class="edit-actions edit-mode-only"><button class="icon-btn edit-secondary" data-pid="${primary.id}" data-secid="${sec.id}">✏️</button><button class="icon-btn del-secondary" data-pid="${primary.id}" data-secid="${sec.id}">🗑️</button></div>`:''}
                </div>`).join(''):'<div class="empty-sub">无子分类</div>'}</div>` : '';
            return `<div class="primary-cat" data-pid="${primary.id}"><div class="primary-header" data-toggle-id="${primary.id}"><span class="primary-title"><span class="collapse-icon">${icon}</span> ${escapeHtml(primary.name)}</span><div class="primary-actions edit-mode-only"><button class="icon-btn edit-primary" data-id="${primary.id}">编辑</button><button class="icon-btn add-secondary" data-id="${primary.id}">+子类</button><button class="icon-btn del-primary" data-id="${primary.id}">删除</button></div></div>${childrenHtml}</div>`;
        }).join('');
        container.innerHTML=`<div class="col">${renderCol(left)}</div><div class="col">${renderCol(right)}</div>`;
        attachMainEvents();
    }

    function attachMainEvents() {
        document.querySelectorAll('.primary-header[data-toggle-id]').forEach(h=>{ h.removeEventListener('click',toggleCollapse); h.addEventListener('click',toggleCollapse); });
        document.querySelectorAll('.secondary-item').forEach(it=>{ it.removeEventListener('click',onSecondaryClick); it.addEventListener('click',onSecondaryClick); });
        document.querySelectorAll('.edit-primary').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); handleEditPrimary(btn.dataset.id); }));
        document.querySelectorAll('.add-secondary').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); handleAddSecondary(btn.dataset.id); }));
        document.querySelectorAll('.del-primary').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); handleDelPrimary(btn.dataset.id); }));
        document.querySelectorAll('.edit-secondary').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); handleEditSecondary(btn.dataset.pid, btn.dataset.secid); }));
        document.querySelectorAll('.del-secondary').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); handleDelSecondary(btn.dataset.pid, btn.dataset.secid); }));
    }
    function toggleCollapse(e){ const id=e.currentTarget.dataset.toggleId; const cat=categories.find(c=>c.id===id); if(cat){ cat.collapsed=!cat.collapsed; saveData(); renderMain(); } }

    // 句子页面逻辑
    const sentencePageDiv = document.getElementById('sentencePage');
    function onSecondaryClick(e){ if(e.target.closest('.icon-btn')) return; const item=e.currentTarget; const pid=item.dataset.pid, secid=item.dataset.secid; const primary=categories.find(p=>p.id===pid); if(primary){ const sec=primary.children.find(c=>c.id===secid); if(sec){ currentPageRef={primaryId:pid, secId:secid}; document.getElementById('pageCategoryTitle').innerText=`${primary.name} · ${sec.name}`; renderSentencePage(sec.sentences); sentencePageDiv.classList.add('open'); sentencePageDiv.scrollTop=0; } } }
    
    function renderSentencePage(sentences){ const container=document.getElementById('sentencePageList'); if(!sentences.length){ container.innerHTML='<div class="empty-placeholder">✧ 暂无句子，添加第一条 ✧</div>'; return; } let html=''; sentences.forEach((sent,idx)=>{ html+=`<div class="sentence-card" data-idx="${idx}"><div class="sentence-index">${(idx+1).toString().padStart(2,'0')}.</div><div class="sentence-text">${escapeHtml(sent)}</div></div>`; }); container.innerHTML=html; document.querySelectorAll('.sentence-card').forEach(card=>{ card.removeEventListener('click',onSentenceCardClick); card.addEventListener('click',onSentenceCardClick); }); }
    
    function onSentenceCardClick(e){ e.stopPropagation(); const card=e.currentTarget; const idx=parseInt(card.dataset.idx); if(isNaN(idx)||!currentPageRef) return; const primary=categories.find(p=>p.id===currentPageRef.primaryId); if(primary){ const sec=primary.children.find(c=>c.id===currentPageRef.secId); if(sec&&sec.sentences[idx]){ currentMenuContext={ primaryId:currentPageRef.primaryId, secId:currentPageRef.secId, sentenceIndex:idx, sentenceText:sec.sentences[idx] }; const rect=card.getBoundingClientRect(); const menu=document.getElementById('actionMenu'); menu.style.top=`${rect.bottom+5}px`; menu.style.left=`${rect.left+10}px`; menu.classList.add('active'); } } }
    
    function closeMenu(){ document.getElementById('actionMenu').classList.remove('active'); currentMenuContext=null; }
    document.getElementById('menuEdit').onclick=()=>{ if(currentMenuContext){ const newText=prompt('编辑句子', currentMenuContext.sentenceText); if(newText && newText.trim()){ const primary=categories.find(p=>p.id===currentMenuContext.primaryId); if(primary){ const sec=primary.children.find(c=>c.id===currentMenuContext.secId); if(sec) sec.sentences[currentMenuContext.sentenceIndex]=newText.trim(); saveData(); if(currentPageRef) renderSentencePage(sec.sentences); renderMain(); } } } closeMenu(); };
    document.getElementById('menuDelete').onclick=()=>{ if(currentMenuContext && confirm('删除此句子？')){ const primary=categories.find(p=>p.id===currentMenuContext.primaryId); if(primary){ const sec=primary.children.find(c=>c.id===currentMenuContext.secId); if(sec) sec.sentences.splice(currentMenuContext.sentenceIndex,1); saveData(); if(currentPageRef) renderSentencePage(sec.sentences); renderMain(); } } closeMenu(); };
    document.getElementById('menuCopy').onclick=()=>{ if(currentMenuContext){ navigator.clipboard.writeText(currentMenuContext.sentenceText); alert('已复制句子'); } closeMenu(); };
    document.addEventListener('click',(e)=>{ if(!e.target.closest('.action-menu') && !e.target.closest('.sentence-card')) closeMenu(); });
    document.getElementById('pageAddSentenceBtn').onclick=()=>{ const input=document.getElementById('pageSentenceInput'); const text=input.value.trim(); if(!text||!currentPageRef) return; const primary=categories.find(p=>p.id===currentPageRef.primaryId); if(primary){ const sec=primary.children.find(c=>c.id===currentPageRef.secId); if(sec){ sec.sentences.push(text); saveData(); renderSentencePage(sec.sentences); input.value=''; renderMain(); } } };
    document.getElementById('closePageBtn').onclick=()=>{ sentencePageDiv.classList.remove('open'); currentPageRef=null; closeMenu(); };
    
    // 打印当前句子页面
    document.getElementById('printPageBtn').onclick=()=>{ window.print(); };

    // 分类 CRUD
    function showDialog(title,def,cb){ const dlg=document.getElementById('commonDialog'); const titleEl=document.getElementById('dialogTitle'); const input=document.getElementById('dialogInput'); titleEl.innerText=title; input.value=def||''; window.dialogCallback=cb; document.getElementById('modalMask').classList.add('active'); dlg.classList.add('active'); }
    function closeDialog(){ document.getElementById('commonDialog').classList.remove('active'); document.getElementById('modalMask').classList.remove('active'); window.dialogCallback=null; }
    document.getElementById('dialogConfirmBtn').onclick=()=>{ const val=document.getElementById('dialogInput').value.trim(); if(val && window.dialogCallback) window.dialogCallback(val); closeDialog(); saveData(); renderMain(); };
    document.getElementById('dialogCancelBtn').onclick=closeDialog;
    document.getElementById('modalMask').addEventListener('click',closeDialog);
    function handleEditPrimary(id){ const cat=categories.find(c=>c.id===id); if(cat) showDialog('编辑分类',cat.name,(newName)=>{ cat.name=newName; }); }
    function handleAddSecondary(pid){ showDialog('新增子分类','',(newName)=>{ const parent=categories.find(p=>p.id===pid); if(parent){ if(!parent.children) parent.children=[]; parent.children.push({id:genId(),name:newName,sentences:[]}); } }); }
    function handleDelPrimary(id){ if(confirm('删除整个分类？')){ categories=categories.filter(c=>c.id!==id); saveData(); renderMain(); if(sentencePageDiv.classList.contains('open')) sentencePageDiv.classList.remove('open'); } }
    function handleEditSecondary(pid,secid){ const primary=categories.find(p=>p.id===pid); if(primary){ const sec=primary.children.find(s=>s.id===secid); if(sec) showDialog('重命名子分类',sec.name,(newName)=>{ sec.name=newName; }); } }
    function handleDelSecondary(pid,secid){ if(confirm('删除子分类及所有句子？')){ const primary=categories.find(p=>p.id===pid); if(primary){ primary.children=primary.children.filter(s=>s.id!==secid); saveData(); renderMain(); if(currentPageRef?.primaryId===pid && currentPageRef?.secId===secid) sentencePageDiv.classList.remove('open'); } } }
    document.getElementById('addPrimaryBtn').onclick=()=>{ showDialog('新增一级分类','',(name)=>{ categories.push({id:genId(),name:name,collapsed:true,children:[]}); }); };
    document.getElementById('toggleEditBtn').onclick=()=>{ document.body.classList.toggle('edit-mode'); const isEdit=document.body.classList.contains('edit-mode'); document.getElementById('toggleEditBtn').innerText=isEdit?'退出编辑':'编辑模式'; if(isEdit) document.getElementById('toggleEditBtn').classList.add('active'); else document.getElementById('toggleEditBtn').classList.remove('active'); renderMain(); };

    // 云端Gist同步
    const settingsModal=document.getElementById('settingsModal');
    document.getElementById('settingsBtn').onclick=()=>settingsModal.classList.add('active');
    document.getElementById('closeSettings').onclick=()=>settingsModal.classList.remove('active');
    async function syncToGist(){ const token=document.getElementById('gistToken').value.trim(); let gistId=document.getElementById('gistId').value.trim(); if(!token){ document.getElementById('syncStatus').innerText='请输入 GitHub Token'; return; } const data={description:'拾句集备份',public:false,files:{'quotes_backup.json':{content:JSON.stringify(categories,null,2)}}}; try{ let url='https://api.github.com/gists'; let method='POST'; if(gistId){ url=`https://api.github.com/gists/${gistId}`; method='PATCH'; } const res=await fetch(url,{method,headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(data)}); if(res.ok){ const json=await res.json(); if(!gistId) document.getElementById('gistId').value=json.id; document.getElementById('syncStatus').innerText='✓ 备份成功！'; }else{ const err=await res.text(); document.getElementById('syncStatus').innerText=`失败: ${err}`; } }catch(e){ document.getElementById('syncStatus').innerText='网络错误'; } }
    async function restoreFromGist(){ const token=document.getElementById('gistToken').value.trim(); const gistId=document.getElementById('gistId').value.trim(); if(!token||!gistId){ document.getElementById('syncStatus').innerText='需要 Token 和 Gist ID'; return; } try{ const res=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{'Authorization':`Bearer ${token}`}}); if(res.ok){ const json=await res.json(); const content=json.files['quotes_backup.json']?.content; if(content){ const loaded=JSON.parse(content); if(loaded && Array.isArray(loaded)){ categories=loaded; saveData(); renderMain(); document.getElementById('syncStatus').innerText='✓ 恢复成功，已刷新'; if(sentencePageDiv.classList.contains('open')) sentencePageDiv.classList.remove('open'); }else throw new Error(); }else throw new Error(); }else throw new Error(); }catch(e){ document.getElementById('syncStatus').innerText='恢复失败，请检查ID/Token'; } }
    document.getElementById('syncToGist').onclick=syncToGist;
    document.getElementById('restoreFromGist').onclick=restoreFromGist;
    loadData();
</script>
</body>
</html>
