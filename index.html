<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 增强版 viewport：完全禁止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>目标追踪 · 极简灰</title>

<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8f8f8;
            min-height: 100vh;
            /* 禁止所有缩放手势 */
            touch-action: pan-y;  /* 只允许垂直滚动，禁止双指缩放 */
            -webkit-text-size-adjust: 100%; /* 禁止文字自动调整 */
            text-size-adjust: 100%;
        }

        #app {
            max-width: 500px;
            margin: 0 auto;
            background-color: #f8f8f8;
            min-height: 100vh;
            position: relative;
        }

        .page {
            padding: 16px;
            padding-bottom: 32px;
        }

        /* 主目标卡片 */
        .main-goal-card {
            background: #5a7a9a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            color: white;
        }

        .goal-display {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .goal-icon {
            font-size: 28px;
            opacity: 0.8;
        }

        .goal-text {
            font-size: 22px;
            font-weight: 400;
            flex: 1;
            word-break: break-word;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .edit-hint {
            font-size: 11px;
            opacity: 0.5;
            white-space: nowrap;
            font-weight: 300;
        }

        .projects-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 16px;
            color: #555;
            margin: 0;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .add-project-btn {
            padding: 6px 14px;
            background-color: #5a7a9a;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-project-btn:hover {
            background-color: #4a6b8a;
        }

        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        /* 项目卡片 */
        .project-card {
            background-color: #ffffff;
            border-radius: 10px;
            border: 1px solid #eaeaea;
            overflow: hidden;
            padding: 12px 12px 16px 12px;
            cursor: pointer;
        }

        .project-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
            padding: 0;
            cursor: pointer;
        }

        .project-info {
            flex: 1;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .project-name {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 2px;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .project-target {
            font-size: 12px;
            color: #888;
            font-weight: 300;
            cursor: pointer;
        }

        .project-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            cursor: default;
        }

        .project-edit-btn,
        .project-delete-btn {
            width: 22px;
            height: 22px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            transition: color 0.2s;
            padding: 0;
            opacity: 0.7;
        }

        .project-edit-btn:hover,
        .project-delete-btn:hover {
            color: #666;
            opacity: 1;
        }

/* 项目复选框样式 */
.project-checkbox {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin-right: 8px;
    cursor: pointer;
    text-align: center;
    line-height: 16px;
    font-size: 12px;
    color: white;
    background-color: white;
    transition: all 0.2s;
    vertical-align: middle;
}

.project-checkbox.checked {
    background-color: #5a7a9a;
    border-color: #5a7a9a;
    color: white;
}

.project-name {
    font-size: 16px;
    font-weight: 400;
    margin-bottom: 2px;
    color: #333;
    cursor: pointer;
    display: flex;
    align-items: center;
}

        /* 备注行 - 靠左，无图标，紧凑 */
        .project-remark-row {
            font-size: 12px;
            padding: 0 0 4px 0;
            margin-bottom: 2px;
            color: #888;
            text-align: left;
        }

        .remark-text {
            font-style: italic;
            word-break: break-word;
            line-height: 1.3;
            color: #888;
        }

        /* 进度条区域 */
        .progress-section {
            margin-top: 4px;
            cursor: default;
        }

        .progress-bar-container {
            height: 6px;
            background-color: #eaeaea;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: #5a7a9a;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }

        .progress-value {
            font-size: 12px;
            color: #5a7a9a;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .button-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn {
            width: 22px;
            height: 22px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            color: #5a7a9a;
            transition: all 0.2s;
            line-height: 1;
        }

        .control-btn:hover {
            background-color: #5a7a9a;
            color: white;
            border-color: #5a7a9a;
        }

        .control-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .current-count {
            font-size: 12px;
            color: #333;
            min-width: 24px;
            text-align: center;
        }

        /* 截止日期标签 - 放在进度条左边 */
        .deadline-chip {
            display: inline-flex;
            align-items: center;
            background-color: #f5f5f5;
            border-radius: 12px;
            padding: 2px 8px;
            gap: 4px;
            font-size: 11px;
            color: #666;
            border: 1px solid #eaeaea;
            margin-right: 6px;
        }

        .deadline-chip-date {
            font-weight: 500;
            color: #5a7a9a;
        }

        .deadline-chip-text {
            opacity: 0.8;
        }

        /* 紧急状态 */
        .deadline-chip.deadline-urgent {
            background-color: #fff1f0;
            border-color: #ffccc7;
            color: #d32f2f;
        }

        .deadline-chip.deadline-urgent .deadline-chip-date {
            color: #d32f2f;
        }

        /* 逾期状态 */
        .deadline-chip.deadline-overdue {
            background-color: #f5f5f5;
            border-color: #d9d9d9;
            color: #999;
            text-decoration: line-through;
        }

        .deadline-chip.deadline-overdue .deadline-chip-date {
            color: #999;
            text-decoration: line-through;
        }

        /* 进度卡片 */
        .summary-card {
            background-color: white;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid #eaeaea;
            margin-top: 16px;
        }

        .summary-title {
            font-size: 14px;
            margin-bottom: 12px;
            color: #666;
            font-weight: 400;
        }

        .progress-bar {
            height: 4px;
            background-color: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: #5a7a9a;
            border-radius: 2px;
        }

        .summary-text {
            font-size: 12px;
            color: #888;
            font-weight: 300;
        }

        /* 底部操作按钮 */
       
        /* 底部操作按钮 */
.bottom-actions {
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #eaeaea;
    gap: 12px;
}

.bottom-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 0;
    background-color: white;
    border: 1px solid #eaeaea;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    color: #666;
    -webkit-tap-highlight-color: transparent; /* 移除触摸高亮 */
}

/* 使用 active 代替 hover，只在点击瞬间生效 */
.bottom-btn:active {
    background-color: #f5f5f5;
    border-color: #5a7a9a;
    color: #5a7a9a;
}

        .btn-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .btn-text {
            font-size: 12px;
            font-weight: 400;
        }

        .bottom-btn.syncing .btn-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 月视图头部 */
        .month-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .nav-btn {
            padding: 4px 12px;
            background-color: white;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            color: #666;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background-color: #f5f5f5;
            border-color: #ccc;
        }

        .project-title {
            font-size: 18px;
            font-weight: 400;
            margin: 0;
            color: #444;
            flex: 1;
            word-break: break-word;
        }

        .stats-card {
            background-color: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #eaeaea;
        }

        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .month-btn {
            padding: 4px 12px;
            background-color: white;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            color: #666;
            transition: all 0.2s;
        }

        .month-btn:hover {
            background-color: #f5f5f5;
            border-color: #ccc;
        }

        .current-month {
            font-size: 15px;
            font-weight: 400;
            color: #666;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .month-progress-bar {
            height: 4px;
            background-color: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
        }

        .month-progress-fill {
            height: 100%;

        }

        /* ========== 待办事项区域（紧凑版，无外框） ========== */
.todo-section {
    background-color: white;
    border-radius: 8px;
    padding: 8px 12px;  /* 减小内边距 */
    margin-bottom: 12px;
    border: 1px solid #eaeaea;
}

.todo-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    padding: 2px 0;
    margin-bottom: 4px;  /* 添加底部间距 */
}

.todo-title-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
}

.todo-title {
    font-size: 14px;
    color: #666;
    font-weight: 400;
}

.todo-count {
    font-size: 12px;
    color: #5a7a9a;
    background-color: #f0f4fa;
    padding: 2px 8px;
    border-radius: 12px;
}

.todo-add-btn {
    width: 26px;  /* 稍微减小 */
    height: 26px;
    background-color: #5a7a9a;
    color: white;
    border: none;
    border-radius: 6px;  /* 减小圆角 */
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
}

.todo-add-btn:hover {

}

.todo-list {
    margin-top: 4px;
}

/* 待办项样式 - 无外框，更紧凑 */
.todo-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 0;  /* 减少内边距 */
    border-bottom: 1px solid #f0f0f0;  /* 只保留底部边框作为分隔 */
    cursor: pointer;
    transition: background-color 0.2s;
}

.todo-item:hover {
    background-color: #f9f9f9;
}

.todo-item:last-child {
    border-bottom: none;
    padding-bottom: 4px;
}

/* 复选框样式 */
.todo-checkbox {
    width: 16px;  /* 稍微减小 */
    height: 16px;
    border: 1px solid #ddd;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 11px;
    background-color: white;
    transition: all 0.2s;

    margin-top: 2px;
}

.todo-checkbox.checked {
    background-color: #5a7a9a;
    border-color: #5a7a9a;
}

.todo-checkbox.checked::after {
    content: "✓";
}

/* 待办内容区域 */
.todo-content {
    flex: 1;
    cursor: pointer;
    min-width: 0;
}

/* 待办头部 - 更紧凑 */
.todo-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;  /* 减小间距 */
}

/* 待办文字 */
.todo-text {
    font-size: 14px;  /* 稍微减小 */
    color: #333;
    font-weight: 400;
    cursor: pointer;
    word-break: break-word;
    flex: 1;
    line-height: 1.4;
}

.todo-text.completed {
    text-decoration: line-through;
    color: #999;
}

/* 右侧操作区域 */
.todo-actions {
    display: flex;
    align-items: center;
    gap: 8px;  /* 减小间距 */
    cursor: default;
}

/* 标签样式 - 更紧凑 */
.todo-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    justify-content: flex-end;
    max-width: 180px;
}

.todo-tag {
    font-size: 10px;  /* 减小字体 */
    padding: 1px 6px;  /* 减小内边距 */
    background-color: #f0f4fa;
    color: #5a7a9a;
    border-radius: 10px;
    display: inline-block;
    max-width: 90px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    border: 1px solid #d0e0f0;
    line-height: 1.4;
}

.todo-tag::before {
    content: "#";
    opacity: 0.7;
    margin-right: 1px;
}

/* 删除按钮 - 更紧凑 */
.todo-delete-btn {
    width: 20px;  /* 减小 */

    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    transition: color 0.2s;

.todo-delete-btn:hover {

    height: 5px;  /* 稍微减小 */

    overflow: hidden;
    margin-bottom: 6px;  /* 减小间距 */
}

.todo-progress-bar-fill {
    height: 100%;
    background-color: #5a7a9a;
    border-radius: 3px;
    transition: width 0.3s ease;
}

/* 进度控制区域 */
.todo-progress-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0;
}

/* 进度数值 */
.todo-progress-value {
    font-size: 11px;  /* 减小 */

    font-weight: 400;
}

/* 进度按钮组 */
.todo-button-group {
    display: flex;
    align-items: center;

}

/* 进度控制按钮 - 更紧凑 */
.todo-control-btn {

<body>
    <div id="app"></div>

    <script>
        // 修正：统一使用同一个存储键名
        const STORAGE_KEY = 'goal_tracker_v10_cloud';
        
        let mainGoal = '赚钱1000元';
        
        // 默认为空数组，没有预设项目
        let projects = [];
        
        let dailyRecords = {};
        
        // 待办事项数据
        let todoItems = {};

        // Gist 配置
        let gistConfig = {
            token: '',
            gistId: ''
        };


        let currentEditTodoTags = '';

        let currentPage = 'home';

        let currentMonth = new Date().toISOString().slice(0, 7);
let showEditTodoModal = false;
let currentEditTodoId = null;
let currentEditTodoProjectId = null;
let currentEditTodoText = '';
let currentEditTodoProgress = 0;
let currentEditTodoTarget = 100;
let currentEditTodoUnit = '个';
        let showAddProjectModal = false;
        let showEditGoalModal = false;
        let showEditRecordModal = false;
        let showEditProjectModal = false;

        let showSettingsModal = false;
        let currentEditDay = null;
        let currentEditContent = '';

        // 待办区域展开/收缩状态
        let todoExpanded = {};

        // 同步状态
        let syncStatus = '';
        let isSyncing = false;

        function loadData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    mainGoal = data.mainGoal || mainGoal;
                    projects = data.projects || [];
                    dailyRecords = data.dailyRecords || {};
                    todoItems = data.todoItems || {};
                    gistConfig = data.gistConfig || { token: '', gistId: '' };
                    
                    console.log('数据加载成功', projects); // 添加日志方便调试
                } else {
                    console.log('首次使用，没有已保存的数据');
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        function saveData() {
            try {
                const data = { mainGoal, projects, dailyRecords, todoItems, gistConfig };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                console.log('数据已保存', projects); // 添加日志方便调试
            } catch (error) {
                console.error('保存数据失败:', error);
            }
        }

        function toSafeString(value) {
            if (value === null || value === undefined) return '';
            if (typeof value === 'object') {
                try {
                    return JSON.stringify(value);
                } catch {
                    return '';
                }
            }
            return String(value);
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }

        function getCurrentYearMonth() {
            const now = new Date();
            return {
                year: now.getFullYear(),
                month: now.getMonth(),
                monthStr: now.toISOString().slice(0, 7)
            };
        }

        function hasContent(value) {
            const str = toSafeString(value);
            return str.trim() !== '';
        }

        function getOverallProgress() {
            if (projects.length === 0) return 0;
            
            let totalProgress = 0;
            for (let i = 0; i < projects.length; i++) {
                const p = projects[i];
                if (p.progressTarget && p.progressTarget > 0) {
                    totalProgress += (p.progressCurrent || 0) / p.progressTarget * 100;
                }
            }
            return Math.round(totalProgress / projects.length);
        }

        function getCompletedProjectsCount() {
            let count = 0;
            for (let i = 0; i < projects.length; i++) {
                const p = projects[i];
                if (p.progressCurrent >= p.progressTarget) {
                    count++;
                }
            }
            return count;
        }

        function getWeekday(year, month, day) {
            const date = new Date(year, month - 1, day);
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            return weekdays[date.getDay()];
        }

// 切换项目完成状态
function toggleProjectComplete(projectId) {
    const project = projects.find(p => p.id === projectId);
    if (project) {
        if (project.progressCurrent >= project.progressTarget) {
            // 如果已完成，则重置为0
            project.progressCurrent = 0;
        } else {
            // 如果未完成，则设为最大值
            project.progressCurrent = project.progressTarget;
        }
        saveData();
        render();
    }
}


        function updateProgress(projectId, delta) {
            const project = projects.find(p => p.id === projectId);
            if (project) {
                const newValue = (project.progressCurrent || 0) + delta;
                if (newValue >= 0 && newValue <= project.progressTarget) {
                    project.progressCurrent = newValue;
                    saveData();
                    render();
                }
            }
        }

        function openRecordModal(day, content) {
            currentEditDay = day;
            currentEditContent = toSafeString(content);
            showEditRecordModal = true;
            render();
            setTimeout(() => {
                const textarea = document.getElementById('record-input');
                if (textarea) {
                    textarea.focus();
                    textarea.value = currentEditContent;
                }
            }, 100);
        }

        function closeRecordModal() {
            showEditRecordModal = false;
            currentEditDay = null;
            currentEditContent = '';
            render();
        }



function openEditTodoModal(projectId, todoId) {
    const key = projectId.toString();
    const todos = todoItems[key];
    if (todos) {
        const todo = todos.find(t => t.id === todoId);
        if (todo) {
            currentEditTodoProjectId = projectId;
            currentEditTodoId = todoId;
            currentEditTodoText = todo.text || '';
            // 如果有进度字段就加载，否则使用空值
            currentEditTodoProgress = todo.progress || 0;
            currentEditTodoTarget = todo.target || '';  // 改为空字符串
            currentEditTodoUnit = todo.unit || '个';
            currentEditTodoTags = todo.tags ? todo.tags.join(' ') : '';
            
            showEditTodoModal = true;
            render();
            
            setTimeout(() => {
                document.getElementById('edit-todo-text')?.focus();
            }, 100);
        }
    }
}



function closeEditTodoModal() {
    showEditTodoModal = false;
    currentEditTodoId = null;
    currentEditTodoProjectId = null;
    render();
}


function saveEditTodo() {
    const textInput = document.getElementById('edit-todo-text');
    const progressInput = document.getElementById('edit-todo-progress');
    const targetInput = document.getElementById('edit-todo-target');
    const unitInput = document.getElementById('edit-todo-unit');
    const tagsInput = document.getElementById('edit-todo-tags');
    
    if (!currentEditTodoProjectId) return;
    
    const key = currentEditTodoProjectId.toString();
    if (!todoItems[key]) {
        todoItems[key] = [];
    }
    
    const text = textInput?.value.trim();
    if (!text) {
        alert('请输入待办内容');
        return;
    }
    
    // 处理标签：按空格或逗号分割，去除空标签
    const tagsString = tagsInput?.value.trim() || '';
    const tags = tagsString.split(/[,\s]+/).filter(tag => tag.trim() !== '');
    
    // 获取进度相关值 - 注意 target 可能为空字符串
    const progress = progressInput?.value ? parseInt(progressInput.value) : NaN;
    const target = targetInput?.value ? parseInt(targetInput.value) : NaN;
    const unit = unitInput?.value.trim();
    
    if (currentEditTodoId) {
        // 编辑现有待办
        const todo = todoItems[key].find(t => t.id === currentEditTodoId);
        if (todo) {
            todo.text = text;
            todo.tags = tags;
            
            // 如果填了目标值（且是有效数字），就添加进度
            if (!isNaN(target) && target > 0) {
                todo.target = target;
                todo.progress = !isNaN(progress) && progress >= 0 ? Math.min(progress, target) : 0;
                todo.unit = unit || '个';
            } else {
                // 没填目标值，就删除进度相关字段
                delete todo.progress;
                delete todo.target;
                delete todo.unit;
            }
        }
    } else {
        // 新增待办
        const newTodo = {
            id: Date.now() + Math.random(),
            text: text,
            tags: tags
        };
        
        // 如果填了目标值（且是有效数字），就添加进度
        if (!isNaN(target) && target > 0) {
            newTodo.target = target;
            newTodo.progress = !isNaN(progress) && progress >= 0 ? Math.min(progress, target) : 0;
            newTodo.unit = unit || '个';
        }
        // 否则不添加任何进度字段
        
        todoItems[key].push(newTodo);
    }
    
    saveData();
    closeEditTodoModal();
}

        function saveRecord() {
            const textarea = document.getElementById('record-input');
            if (textarea && currentEditDay) {
                const content = textarea.value;
                const key = currentProjectId + '_' + currentMonth;
                if (!dailyRecords[key]) dailyRecords[key] = {};
                dailyRecords[key][currentEditDay] = content;
                saveData();
            }
            closeRecordModal();
        }



function openAddTodoModal() {
    // 重置为默认值
    currentEditTodoProjectId = currentProjectId;
    currentEditTodoId = null;

    currentEditTodoProgress = 0;
    currentEditTodoTarget = '';  // 空字符串
    currentEditTodoUnit = '';     // 也改为空字符串

        document.getElementById('edit-todo-text')?.focus();

}




        // 更新待办进度
        function updateTodoProgress(projectId, todoId, delta) {
            const key = projectId.toString();
            const todos = todoItems[key];
            if (todos) {
                const todo = todos.find(t => t.id === todoId);
                if (todo && todo.progress !== undefined) {
                    const newValue = todo.progress + delta;
                    if (newValue >= 0 && newValue <= todo.target) {
                        todo.progress = newValue;
                        saveData();
                        render();
                    }
                }
            }
        }

    
        function toggleTodoComplete(projectId, todoId) {
    const key = projectId.toString();
    const todos = todoItems[key];
    if (todos) {
        const todo = todos.find(t => t.id === todoId);
        if (todo && todo.target !== undefined && todo.target > 0) {
            if (todo.progress >= todo.target) {
                todo.progress = 0;
            } else {
                todo.progress = todo.target;
            }
            saveData();
            render();
        }
    }
}
        function deleteTodo(projectId, todoId) {
            const key = projectId.toString();
            const todos = todoItems[key];
            if (todos) {
                todoItems[key] = todos.filter(t => t.id !== todoId);
                saveData();
                render();
            }
        }

        function toggleTodoSection(projectId) {
            todoExpanded[projectId] = !todoExpanded[projectId];
            render();
        }

        // 设置弹窗
        function openSettingsModal() {
            showSettingsModal = true;
            render();
            setTimeout(() => {
                document.getElementById('gist-token').value = gistConfig.token || '';
                document.getElementById('gist-id').value = gistConfig.gistId || '';
            }, 100);
        }

        function closeSettingsModal() {
            showSettingsModal = false;
            syncStatus = '';
            render();
        }

        function saveSettings() {
            const token = document.getElementById('gist-token')?.value || '';
            const gistId = document.getElementById('gist-id')?.value || '';
            
            gistConfig.token = token.trim();
            gistConfig.gistId = gistId.trim();
            
            saveData();
            closeSettingsModal();
        }

        // Gist 同步功能
        async function syncToGist() {
            if (!gistConfig.token || !gistConfig.gistId) {
                syncStatus = '请先在设置中配置 Token 和 Gist ID';
                render();
                return;
            }

            isSyncing = true;
            syncStatus = '同步中...';
            render();

            try {
                const data = {
                    mainGoal,
                    projects,
                    dailyRecords,
                    todoItems
                };

                const content = JSON.stringify(data, null, 2);
                
                const response = await fetch(`https://api.github.com/gists/${gistConfig.gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${gistConfig.token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        files: {
                            'goal-tracker-backup.json': {
                                content: content
                            }
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`同步失败: ${response.status}`);
                }

                syncStatus = '同步成功！';
                isSyncing = false;
                render();
                
                setTimeout(() => {
                    syncStatus = '';
                    render();
                }, 3000);
            } catch (error) {
                console.error('同步失败:', error);
                syncStatus = `同步失败: ${error.message}`;
                isSyncing = false;
                render();
            }
        }

  async function restoreFromGist() {
    if (!gistConfig.token || !gistConfig.gistId) {
        syncStatus = '请先在设置中配置 Token 和 Gist ID';
        render();
        return;
    }

    isSyncing = true;
    syncStatus = '恢复中...';
    render();

    try {
        const response = await fetch(`https://api.github.com/gists/${gistConfig.gistId}`, {
            headers: {
                'Authorization': `token ${gistConfig.token}`,
                'Accept': 'application/vnd.github.v3+json'
            }
        });

        if (!response.ok) {
            throw new Error(`恢复失败: ${response.status}`);
        }

        const gist = await response.json();
        const content = gist.files['goal-tracker-backup.json']?.content;
        
        if (!content) {
            throw new Error('未找到备份文件');
        }

        const data = JSON.parse(content);
        
        // 恢复数据，但保留当前的 gistConfig
        mainGoal = data.mainGoal || mainGoal;
        projects = data.projects || [];
        dailyRecords = data.dailyRecords || {};
        todoItems = data.todoItems || {};
        // 注意：不恢复 gistConfig，保留当前设置
        
        saveData();
        
        syncStatus = '恢复成功！';
        isSyncing = false;
        render();
        
        setTimeout(() => {
            syncStatus = '';
            render();
        }, 3000);
    } catch (error) {
        console.error('恢复失败:', error);
        syncStatus = `恢复失败: ${error.message}`;
        isSyncing = false;
        render();
    }
}

        function renderHome() {

for (let i = 0; i < projects.length; i++) {

        if (diffDays > 0) {

}

            if (!project) return;
            
            const nameInput = document.getElementById('edit-project-name');
            const targetInput = document.getElementById('edit-project-target');

            const unitInput = document.getElementById('edit-project-unit');

            if (targetInput) {

            }
            
            // 保存截止日期
            if (deadlineInput) {
                project.deadline = deadlineInput.value || null;

            if (targetNumberInput?.value) {
                const num = parseInt(targetNumberInput.value);
                if (!isNaN(num) && num > 0) {
                    project.progressTarget = num;

            if (unitInput?.value.trim()) {
                project.progressUnit = unitInput.value.trim();
            }
            
            if (currentInput?.value) {
                const num = parseInt(currentInput.value);
                if (!isNaN(num) && num >= 0) {

            const newDate = new Date(year, month - 1 + delta, 1);
            currentMonth = newDate.getFullYear() + '-' + String(newDate.getMonth() + 1).padStart(2, '0');
            render();
        };
