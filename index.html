<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目标追踪</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 16px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .goal-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 24px;
            text-align: center;
        }
        .goal-text {
            font-size: 24px;
            font-weight: 600;
        }
        .projects {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .project-item {
            background: white;
            padding: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .project-icon {
            font-size: 32px;
        }
        .project-name {
            font-size: 18px;
            font-weight: 500;
        }
        .progress-bar {
            background: #f0f0f0;
            height: 12px;
            border-radius: 6px;
            margin-top: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            color: white;
            font-size: 10px;
            line-height: 12px;
            text-align: right;
            padding-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- 内容会通过 JavaScript 动态生成 -->
    </div>

    <script>
        const app = document.getElementById('app');
        
        // 数据
        let mainGoal = '赚钱1000元';
        let projects = [
            { id: 1, name: '淘宝开店', icon: '🛒', target: '月入500元' },
            { id: 2, name: '闲鱼卖东西', icon: '📱', target: '卖出10件' },
            { id: 3, name: '抖音带货', icon: '🎵', target: '涨粉1000' }
        ];

        // 渲染页面
        function render() {
            app.innerHTML = `
                <div class="goal-card">
                    <div style="font-size: 16px; opacity: 0.9; margin-bottom: 8px;">主要目标</div>
                    <div class="goal-text">${mainGoal}</div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                    <h3 style="margin: 0;">我的项目</h3>
                    <button style="background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 20px;">+ 新建</button>
                </div>
                <div class="projects">
                    ${projects.map(p => `
                        <div class="project-item">
                            <span class="project-icon">${p.icon}</span>
                            <div style="flex: 1;">
                                <div class="project-name">${p.name}</div>
                                <div style="font-size: 13px; color: #666;">${p.target}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div style="background: white; border-radius: 16px; padding: 20px; margin-top: 20px;">
                    <h4 style="margin: 0 0 12px 0;">本月进度</h4>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 30%;">30%</div>
                    </div>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
