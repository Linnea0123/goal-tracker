    /* 手机端统一所有表单元素高度 */
.modal-input,
.modal-input[type="date"],
.modal-input[type="text"],
.modal-input[type="number"],
select.modal-input {
    padding: 12px 12px !important;
    height: 44px !important;
    line-height: 20px !important;
    font-size: 16px !important;
    box-sizing: border-box !important;
    -webkit-appearance: none !important;
    appearance: none !important;
}

/* 针对 select 特别处理 */
select.modal-input {
    background-color: #fafafa;
    cursor: pointer;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 16px;
}

/* 针对日期输入框 */
.modal-input[type="date"] {
    position: relative;
    background-color: #fafafa;
}

/* 移除日期选择器的默认内边距 */
.modal-input[type="date"]::-webkit-datetime-edit-fields-wrapper {
    padding: 0;
}

.modal-input[type="date"]::-webkit-datetime-edit-text {
    padding: 0 2px;
}

.modal-input[type="date"]::-webkit-datetime-edit-month-field,
.modal-input[type="date"]::-webkit-datetime-edit-day-field,
.modal-input[type="date"]::-webkit-datetime-edit-year-field {
    padding: 0 2px;
}

    
    /* 强制日期输入框宽度为100% */
.modal-input[type="date"] {
    width: 100% !important;
    box-sizing: border-box !important;
    -webkit-appearance: none;
    appearance: none;
}

let showEditTimelineEventModal = false;
let currentEditEventId = null;
let currentEditEventData = null;

function openEditTimelineEventModal(projectId, eventId) {
    const events = timelineEvents[projectId] || [];
    const event = events.find(e => e.id === eventId);
    if (event) {
        currentEditEventId = eventId;
        currentEditEventData = JSON.parse(JSON.stringify(event));
        showEditTimelineEventModal = true;
        render();
        setTimeout(() => {
            const input = document.getElementById('edit-event-title');
            if (input) input.focus();
        }, 100);
    }
}

function closeEditTimelineEventModal() {
    showEditTimelineEventModal = false;
    currentEditEventId = null;
    currentEditEventData = null;
    render();
}

function addAdditionToEvent() {
    const additionText = document.getElementById('edit-event-addition');
    if (!additionText?.value.trim()) {
        alert('请输入追加内容');
        return;
    }
    
    if (!currentEditEventData.additions) {
        currentEditEventData.additions = [];
    }
    
    currentEditEventData.additions.push({
        content: additionText.value.trim(),
        date: new Date().toISOString().slice(0, 10)
    });
    
    additionText.value = '';
    render();
    setTimeout(() => {
        const input = document.getElementById('edit-event-addition');
        if (input) input.focus();
    }, 100);
}

function deleteAddition(index) {
    if (confirm('确定删除这条追加内容吗？')) {
        currentEditEventData.additions.splice(index, 1);
        render();
    }
}

function saveTimelineEventEdit() {
    const titleInput = document.getElementById('edit-event-title');
    const remarkInput = document.getElementById('edit-event-remark');
    const dateInput = document.getElementById('edit-event-date');
    
    if (!titleInput?.value.trim()) {
        alert('请输入事件标题');
        return;
    }
    
    if (!dateInput?.value) {
        alert('请选择日期');
        return;
    }
    
    // 更新事件数据
    currentEditEventData.title = titleInput.value.trim();
    currentEditEventData.remark = remarkInput?.value.trim() || '';
    currentEditEventData.date = dateInput.value;
    
    // 保存到全局数据
    if (timelineEvents[currentProjectId]) {
        const index = timelineEvents[currentProjectId].findIndex(e => e.id === currentEditEventId);
        if (index !== -1) {
            timelineEvents[currentProjectId][index] = currentEditEventData;
        }
    }

}

// 财政视图的复选框切换（有金额时打钩）
function toggleFinanceCheck(monthStr, day) {
    const key = monthStr;
    if (!financeRecords[key]) financeRecords[key] = {};
    if (!financeRecords[key][day]) financeRecords[key][day] = { text: '', amount: '' };
    
    if (financeRecords[key][day].amount && parseFloat(financeRecords[key][day].amount) > 0) {
        // 如果有金额，清空金额
        financeRecords[key][day].amount = '';
        if (!financeRecords[key][day].text) {
            delete financeRecords[key][day];
            if (Object.keys(financeRecords[key]).length === 0) {
                delete financeRecords[key];
            }
        }
    } else {
        // 如果没有金额，设置默认值
        financeRecords[key][day].amount = '30';
    }
    
    saveData();
    render();
}

function getViewDisplayName() {

        if (viewType === 'english') return '英语';
        if (viewType === 'finance') return '财政';

        if (viewType === 'timeline') return '事线';
        return '常规';
    }
    
    if (currentPage === 'english') return '英语';
    if (currentPage === 'finance') return '财政';
    if (currentPage === 'duration') return '时长';
    if (currentPage === 'timeline') return '事线';
    if (currentPage === 'project') return '常规';
    
    return '视图';
}


// ==================== 辅助函数 ====================
function toSafeString(value) {
    if (value === null || value === undefined) return '';
    if (typeof value === 'object') {
        try { return JSON.stringify(value); } catch { return ''; }
    }
    return String(value);
}

function getDaysInMonth(year, month) {
    return new Date(year, month + 1, 0).getDate();
}

function getCurrentYearMonth() {
    const now = new Date();
    return { year: now.getFullYear(), month: now.getMonth(), monthStr: now.toISOString().slice(0, 7) };
}

function getWeekStart(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(d.setDate(diff)).toISOString().split('T')[0];
}

function getWeekEnd(weekStart) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + 6);
    return d.toISOString().split('T')[0];
}

function getWeekDays(weekStart) {
    const days = [];
    const start = new Date(weekStart);
    for (let i = 0; i < 7; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        days.push({
            date: d.toISOString().split('T')[0],
            day: d.getDate(),
            month: d.getMonth() + 1,
            year: d.getFullYear(),
            weekday: getWeekday(d.getFullYear(), d.getMonth() + 1, d.getDate())
        });
    }
    return days;
}

function hasContent(value) {
    const str = toSafeString(value);
    return str.trim() !== '';
}

function getWeekday(year, month, day) {
    const date = new Date(year, month - 1, day);
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    return weekdays[date.getDay()];
}

// ==================== 核心函数（必须在所有渲染函数之前定义）====================
function getCurrentGoal() {
    if (goals.length === 0) return null;
    return goals.find(g => g.id === currentGoalId) || goals[0];
}

function getCurrentGoalCategories() {
    const currentGoal = getCurrentGoal();
    if (!currentGoal) return [];
    if (!categories[currentGoal.id]) {
        categories[currentGoal.id] = [];
    }
    return categories[currentGoal.id];
}

function getOverallProgress() {
    const currentProjects = projects.filter(p => p.goalId === currentGoalId);
    if (currentProjects.length === 0) return 0;
    let total = 0;
    for (let p of currentProjects) {
        if (p.progressTarget && p.progressTarget > 0) {
            total += (p.progressCurrent || 0) / p.progressTarget * 100;
        }
    }
    return Math.round(total / currentProjects.length);
}

function getCompletedProjectsCount() {
    const currentProjects = projects.filter(p => p.goalId === currentGoalId);
    return currentProjects.filter(p => p.progressCurrent >= p.progressTarget).length;
}

function loadData() {

            const data = JSON.parse(saved);
            
            // ========== 数据迁移和修复 ==========
            
            // 1. 修复 goals 数据
            goals = data.goals || [];

                // 如果没有目标，创建一个默认目标
                goals = [{
                    id: 'g' + Date.now(),
                    name: '我的目标',
                    icon: '🎯',
                    color: BLUE_COLORS[0]
                }];

            } else {
                // 确保每个目标都有必要字段
                goals = goals.map((g, index) => ({
                    id: g.id || 'g' + Date.now() + index,
                    name: g.name || '未命名目标',
                    icon: g.icon || '🎯',
                    color: g.color || BLUE_COLORS[index % BLUE_COLORS.length]
                }));
            }
            
            // 2. 修复 currentGoalId
            currentGoalId = data.currentGoalId;
            // 检查 currentGoalId 是否有效
            const goalExists = goals.some(g => g.id === currentGoalId);
            if (!currentGoalId || !goalExists) {
                currentGoalId = goals[0].id;
                console.log('✅ 修复 currentGoalId:', currentGoalId);
            }
            
            // 3. 修复 projects 数据
            projects = data.projects || [];
            // 确保每个项目都有 goalId
            projects = projects.map(p => ({
                ...p,
                goalId: p.goalId || currentGoalId,
                progressCurrent: p.progressCurrent || 0,
                progressTarget: p.progressTarget || 0
            }));
            
            // 4. 修复其他数据
            timelineRemarks = data.timelineRemarks || {};
            dailyRecords = data.dailyRecords || {};
            todoItems = data.todoItems || {};
            archivedProjects = data.archivedProjects || [];  // ← 添加这一行
            gistConfig = data.gistConfig || { token: '', gistId: '' };
            recordChecked = data.recordChecked || {};
            financeRecords = data.financeRecords || {};
            progressType = data.progressType || 'monthly';
            durationRecords = data.durationRecords || {};
            englishRecords = data.englishRecords || {};
            todoExpanded = data.todoExpanded || {};
            viewCalendarPreferences = data.viewCalendarPreferences || {};

            timelineEvents = data.timelineEvents || {};
currentTimelineProjectId = data.currentTimelineProjectId || null;
            // 5. 修复项目视图偏好
            projectViewTypePreferences = data.projectViewTypePreferences || {};
            currentProjectViewType = data.currentProjectViewType || 'project';
            
            // 6. 修复分类数据
            if (Array.isArray(data.categories)) {
                categories = {};
                if (goals.length > 0) {
                    categories[goals[0].id] = data.categories;
                }
            } else {
                categories = data.categories || {};
            }
            
            // 确保每个目标都有分类数组
            goals.forEach(goal => {
                if (!categories[goal.id]) {
                    categories[goal.id] = [];
                }
            });
            
            // 7. 修复页面状态
            currentPage = data.currentPage || 'home';
            currentProjectId = data.currentProjectId || null;
            
            // 如果恢复的是项目详情页，但项目不存在，则返回主页
            if (currentPage !== 'home' && currentProjectId) {
                const projectExists = projects.some(p => p.id === currentProjectId);
                if (!projectExists) {
                    currentPage = 'home';

                    console.log('⚠️ 项目不存在，返回主页');
                } else {

                    const savedViewType = projectViewTypePreferences[currentProjectId];
                    if (savedViewType && savedViewType !== 'project') {
                        if (savedViewType === 'english') currentPage = 'english';
                        else if (savedViewType === 'finance') currentPage = 'finance';
                        else if (savedViewType === 'duration') currentPage = 'duration';
                        currentProjectViewType = savedViewType;
                    }
                }
            }
            
            calendarViewType = viewCalendarPreferences[currentPage] || 'week';
            
            console.log('✅ 数据加载成功', {
                goalsCount: goals.length,
                currentGoalId: currentGoalId,
                projectsCount: projects.length,
                currentPage: currentPage
            });
            
        } else {
            // 首次使用，创建默认数据
            console.log('🆕 首次使用，创建默认数据');
            goals = [{
                id: 'g' + Date.now(),

            }];

            projects = [];
            dailyRecords = {};
            todoItems = {};
            categories = {};
            financeRecords = {};
            durationRecords = {};
            englishRecords = {};
            projectViewTypePreferences = {};
            currentPage = 'home';
            currentProjectId = null;
            currentProjectViewType = 'project';
            calendarViewType = 'week';
            
            // 立即保存默认数据
            saveData();
        }
    } catch (error) {
        console.error('❌ 加载数据失败:', error);
        // 出错时使用完全默认的数据
        goals = [{
            id: 'g' + Date.now(),
            name: '我的目标',
            icon: '🎯',
            color: BLUE_COLORS[0]
        }];
        currentGoalId = goals[0].id;
        projects = [];

        todoItems = {};
        categories = {};
        financeRecords = {};
        durationRecords = {};
        englishRecords = {};
        projectViewTypePreferences = {};
        currentPage = 'home';
        currentProjectId = null;
        currentProjectViewType = 'project';
        calendarViewType = 'week';
        saveData();
    }
}

// 检测文本内容，判断是否需要标记为红叉叉
function getCheckboxType(text) {
    if (!text || text.trim() === '') return 'normal';
    
    // 定义需要标记为红叉叉的关键词
    const sleepIssues = [
        '熬夜', '失眠', '晚睡', '睡不着', '难入睡', '夜醒', '睡眠不足',
        '通宵', '彻夜', '未睡', '没睡', '睡不好', '睡眠差', '熬夜了',
        '失眠了', '晚睡了', '睡太晚', '凌晨', '天亮才睡', '睡眠质量差'
    ];
    
    const lowerText = text.toLowerCase();
    for (let keyword of sleepIssues) {
        if (lowerText.includes(keyword.toLowerCase())) {
            return 'red-cross';
        }
    }
    return 'normal';
}

function renderDurationView() {
    const [year, month] = currentMonth.split('-').map(Number);
    const daysInMonth = getDaysInMonth(year, month - 1);
    const key = currentMonth;
    const records = durationRecords[key] || {};
    const today = new Date();
    const todayStr = today.toISOString().slice(0, 7);
    const todayDay = today.getDate();
    
    // 计算当月总时长和平均时长
    let totalDuration = 0;
    let durationDays = 0;
    for (let d = 1; d <= daysInMonth; d++) {
        const val = records[d];
        if (val && typeof val === 'object' && val.duration) {
            const num = parseFloat(val.duration);
            if (!isNaN(num)) {
                totalDuration += num;
                durationDays++;
            }
        }
    }
    const avgDuration = durationDays > 0 ? (totalDuration / durationDays).toFixed(0) : 0;
    
    // 格式化时长显示
    const formatDuration = (minutes) => {
        if (minutes >= 60) {
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return mins > 0 ? `${hours}h${mins}m` : `${hours}h`;
        }
        return `${minutes}m`;
    };
    
    const totalDisplay = formatDuration(totalDuration);
    const avgDisplay = formatDuration(avgDuration);
    
    // 生成每日记录行
    let daysRows = '';
    
    if (calendarViewType === 'month') {
        for (let day = 1; day <= daysInMonth; day++) {
            const isToday = currentMonth === todayStr && day === todayDay;
            const record = records[day] || { text: '', duration: '' };
            const weekday = getWeekday(year, month, day);
            const todayClass = isToday ? 'today-date' : '';
            const contentClass = isToday ? 'today-content' : '';
            const isChecked = record.duration && parseFloat(record.duration) > 0;
            
            
            daysRows += `
    <div class="date-row">
        <div class="date-column ${todayClass}">
            <span class="date-day">${day}</span>
            <span class="date-week">${weekday}</span>
        </div>

            <div class="record-checkbox ${isChecked ? 'checked' : ''}"

function renderEnglishView() {
    const [year, month] = currentMonth.split('-').map(Number);

    const todayStr = today.toISOString().slice(0, 7);
    const todayDay = today.getDate();
    
    // 计算当月总本数和平均本数
    let totalBooks = 0;
    let bookDays = 0;
    for (let d = 1; d <= daysInMonth; d++) {
        const record = records[d];
        if (record && record.books && !isNaN(parseFloat(record.books))) {
            totalBooks += parseFloat(record.books);
            bookDays++;
        }

    const avgBooks = bookDays > 0 ? (totalBooks / bookDays).toFixed(1) : 0;

function updateDurationText(monthStr, day, value) {
    const key = monthStr;
    if (!durationRecords[key]) durationRecords[key] = {};
    if (!durationRecords[key][day]) durationRecords[key][day] = { text: '', duration: '' };
    
    durationRecords[key][day].text = value.trim();
    
    // 如果文字和时长都为空，删除整个记录
    if (!durationRecords[key][day].text && !durationRecords[key][day].duration) {
        delete durationRecords[key][day];
    }
    
    saveData();
    render();
}

function updateDurationTime(monthStr, day, value) {
    const key = monthStr;
    if (!durationRecords[key]) durationRecords[key] = {};
    if (!durationRecords[key][day]) durationRecords[key][day] = { text: '', duration: '' };
    
    const num = parseFloat(value);
    if (!isNaN(num) && num > 0) {
        durationRecords[key][day].duration = num;
    } else {
        durationRecords[key][day].duration = '';

    }
    
    saveData();
    render();
}

 function updateRecord(projectId, monthStr, day, value) {
    const key = projectId + '_' + monthStr;
    if (!dailyRecords[key]) dailyRecords[key] = {};
    if (value.trim() === '') {
        delete dailyRecords[key][day];
    } else {
        dailyRecords[key][day] = value;
    }
    
    // 自动检测并更新复选框状态
    const checkboxType = getCheckboxType(value);
    const checkKey = `${projectId}_${monthStr}_${day}`;
    
    if (checkboxType === 'red-cross') {
        // 如果是熬夜等关键词，自动标记为红叉叉（不存储到 recordChecked，让渲染时自动显示）
        // 同时清除可能的打勾状态
        delete recordChecked[checkKey];
    } else {
        // 非熬夜内容，保持原有逻辑
        // 注意：不自动修改 recordChecked，让用户自己决定是否打勾
    }
    
    saveData();
    render();
}
 
function updateFinanceRecord(monthStr, day, field, value) {
    const key = monthStr;
    if (!financeRecords[key]) financeRecords[key] = {};
    if (!financeRecords[key][day]) financeRecords[key][day] = { text: '', amount: '' };
    
    if (field === 'text') {
        financeRecords[key][day].text = value.trim();
    } else if (field === 'amount') {
        financeRecords[key][day].amount = value.trim();
    }
    
    // 如果文字和金额都为空，删除整个记录
    if (!financeRecords[key][day].text && !financeRecords[key][day].amount) {
        delete financeRecords[key][day];
        // 如果当月没有记录，也删除月份记录
        if (Object.keys(financeRecords[key]).length === 0) {
            delete financeRecords[key];
        }
    }
    
    saveData();
    render();
}


function toggleRecordCheck(projectId, monthStr, day) {
    const checkKey = `${projectId}_${monthStr}_${day}`;
    const project = projects.find(p => p.id === projectId);
    if (!project) return;
    
    // 获取该日期的记录内容
    const recordKey = `${projectId}_${monthStr}`;

    const content = records[day] || '';
    const checkboxType = getCheckboxType(content);
    
    // 如果内容是睡眠问题，切换时保持红叉叉，不打勾
    if (checkboxType === 'red-cross') {
        // 红叉叉状态：点击后清除红叉叉
        if (recordChecked[checkKey]) {
            // 如果已经标记，则取消标记
            delete recordChecked[checkKey];
        } else {
            // 标记为红叉叉（实际上 recordChecked 不存储红叉叉状态）
            // 红叉叉是根据内容自动显示的，这里不需要存储
        }
    } else {
        // 正常内容，切换打勾状态
        recordChecked[checkKey] = !recordChecked[checkKey];
    }
    
    saveData();
    render();
}

            const tagsString = tagsInput?.value.trim() || '';
            const tags = tagsString.split(/[,\s]+/).filter(tag => tag.trim() !== '');
            const progress = progressInput?.value ? parseInt(progressInput.value) : NaN;
            const target = targetInput?.value ? parseInt(targetInput.value) : NaN;
            const unit = unitInput?.value.trim();
            
            if (currentEditTodoId) {
                const todo = todoItems[key].find(t => t.id === currentEditTodoId);
                if (todo) {
                    todo.text = text; todo.tags = tags;
                    if (!isNaN(target) && target > 0) {
                        todo.target = target;
                        todo.progress = !isNaN(progress) && progress >= 0 ? Math.min(progress, target) : 0;
                        todo.unit = unit || '个';
                    } else { delete todo.progress; delete todo.target; delete todo.unit; }
                }
            } else {
                const newTodo = { id: Date.now() + Math.random(), text: text, tags: tags };
                if (!isNaN(target) && target > 0) {
                    newTodo.target = target;
                    newTodo.progress = !isNaN(progress) && progress >= 0 ? Math.min(progress, target) : 0;

async function syncToGist() {
    if (!gistConfig.token || !gistConfig.gistId) {
        syncStatus = '请先在设置中配置 Token 和 Gist ID'; render(); return;
    }
    isSyncing = true; syncStatus = '同步中...'; render();
    try {
        const data = { 
            goals, 
            currentGoalId, 
            projects, 
            dailyRecords, 
            todoItems, 
            recordChecked, 
            progressType,
            todoExpanded,
            categories,
            durationRecords,
            financeRecords,
            englishRecords  // 添加英语视图数据
        };
        const content = JSON.stringify(data, null, 2);

        const response = await fetch(`https://api.github.com/gists/${gistConfig.gistId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${gistConfig.token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ files: { 'goal-tracker-backup.json': { content: content } } })
        });
        if (!response.ok) throw new Error(`同步失败: ${response.status}`);
        syncStatus = '同步成功！'; isSyncing = false; render();
        setTimeout(() => { syncStatus = ''; render(); }, 3000);
    } catch (error) {
        console.error('同步失败:', error);
        syncStatus = `同步失败: ${error.message}`; isSyncing = false; render();
    }
}


  

async function restoreFromGist() {
    if (!gistConfig.token || !gistConfig.gistId) {
        syncStatus = '请先在设置中配置 Token 和 Gist ID'; render(); return;
    }
    isSyncing = true; syncStatus = '恢复中...'; render();
    try {
        const response = await fetch(`https://api.github.com/gists/${gistConfig.gistId}`, {
            headers: { 'Authorization': `token ${gistConfig.token}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!response.ok) throw new Error(`恢复失败: ${response.status}`);
        const gist = await response.json();
        const content = gist.files['goal-tracker-backup.json']?.content;
        if (!content) throw new Error('未找到备份文件');
        
        const data = JSON.parse(content);
        goals = data.goals || goals;
        goals = goals.map((g, index) => ({
            ...g,
            color: g.color || BLUE_COLORS[index % BLUE_COLORS.length]
        }));
        currentGoalId = data.currentGoalId || currentGoalId;
        projects = data.projects || [];
        dailyRecords = data.dailyRecords || {};
        todoItems = data.todoItems || {};
        todoExpanded = data.todoExpanded || {};
        recordChecked = data.recordChecked || {};
        progressType = data.progressType || 'monthly';
        categories = data.categories || {};
        durationRecords = data.durationRecords || {};
        financeRecords = data.financeRecords || {};
        englishRecords = data.englishRecords || {};
        
        // 确保每个目标都有分类数组
        if (goals.length > 0) {
            goals.forEach(goal => {
                if (!categories[goal.id]) {
                    categories[goal.id] = [];
                }
            });
        }
        
        saveData();
        syncStatus = '恢复成功！'; isSyncing = false; render();
        setTimeout(() => { syncStatus = ''; render(); }, 3000);
    } catch (error) {
        console.error('恢复失败:', error);
        syncStatus = `恢复失败: ${error.message}`; isSyncing = false; render();
    }
}

function switchCategory(categoryId) {

function closeCategoryModal() {
    showCategoryModal = false;

function addCategory() {
    const nameInput = document.getElementById('new-category-name');
    const currentGoal = getCurrentGoal();
    if (!currentGoal) return;
    
    if (nameInput?.value.trim()) {
        const newCategory = {
            id: 'cat' + Date.now(),
            name: nameInput.value.trim(),
            icon: '📁',
            color: BLUE_COLORS[Math.floor(Math.random() * BLUE_COLORS.length)]
        };
        
        if (!categories[currentGoal.id]) {
            categories[currentGoal.id] = [];
        }
        categories[currentGoal.id].push(newCategory);
        nameInput.value = '';
        saveData();
        render();
    }
}

function deleteCategory(categoryId) {
    const currentGoal = getCurrentGoal();
    if (!currentGoal) return;
    
    // 检查是否有项目在使用这个分类
    const projectsUsing = projects.filter(p => p.goalId === currentGoal.id && p.categoryId === categoryId);
    if (projectsUsing.length > 0) {
        alert(`无法删除：还有 ${projectsUsing.length} 个项目使用此分类，请先修改这些项目的分类`);
        return;
    }
    
    if (confirm('确定删除这个分类吗？')) {
        categories[currentGoal.id] = (categories[currentGoal.id] || []).filter(c => c.id !== categoryId);
        saveData();
        render();
    }
}

function editCategory(categoryId) {
    const currentGoal = getCurrentGoal();
    if (!currentGoal) return;
    
    const goalCategories = categories[currentGoal.id] || [];
    const category = goalCategories.find(c => c.id === categoryId);
    if (!category) return;
    
    const newName = prompt('输入新的分类名称', category.name);
    if (newName && newName.trim()) {
        category.name = newName.trim();
        saveData();
        render();
    }
}

function quickAddCategory() {
    const currentGoal = getCurrentGoal();
    if (!currentGoal) return;
    
    const categoryName = prompt('请输入分类名称', '新分类');
    if (categoryName && categoryName.trim()) {
        const newCategory = {
            id: 'cat' + Date.now(),
            name: categoryName.trim(),
            icon: '📁',
            color: BLUE_COLORS[Math.floor(Math.random() * BLUE_COLORS.length)]
        };
        
        if (!categories[currentGoal.id]) {
            categories[currentGoal.id] = [];
        }
        categories[currentGoal.id].push(newCategory);
        saveData();
        
        // 重新渲染弹窗并选中新建的分类
        render();
        setTimeout(() => {
            // 设置新建项目弹窗的下拉框
            const select = document.getElementById('project-category-select');
            if (select) {
                select.value = newCategory.id;
            }
            // 设置编辑项目弹窗的下拉框
            const editSelect = document.getElementById('edit-project-category');
            if (editSelect) {
                editSelect.value = newCategory.id;
            }
        }, 100);
    }
}
